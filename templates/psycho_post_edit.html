{% extends 'layout.html' %}
{% block content %}
<div class="container py-4" style="max-width: 700px;">
    <h4 class="fw-bold mb-3">✏️ 심리상담 수정</h4>
    <form method="post" class="card border-0 shadow-sm p-4" style="border-radius:16px;">
        <div class="mb-2">
            <label class="small fw-bold">제목</label>
            <input type="text" name="title" class="form-control form-control-sm" value="{{ post.title }}" required>
        </div>
        <div class="mb-2">
            <label class="small fw-bold">내용</label>
            <textarea name="content" class="summernote-editor form-control" rows="8">{{ post.content }}</textarea>
        </div>
        {% if post.status == 'flagged' %}<div class="alert alert-warning small mb-2">AI가 부적절한 내용을 감지했습니다. 수정 후 다시 검토됩니다.</div>{% endif %}
        <button type="submit" class="btn btn-success w-100">수정 완료</button>
    </form>
    <div class="text-center mt-3">
        <a href="/psycho/post/{{ post.id }}" class="btn btn-sm btn-outline-secondary">&larr; 돌아가기</a>
    </div>
</div>
{% endblock %}
