<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>외부 페이지로 이동</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<style>
    body { background: #f8f9fa; display: flex; align-items: center; justify-content: center; min-height: 100vh; }
    .card { max-width: 420px; width: 100%; border-radius: 20px; }
</style>
</head>
<body>
<div class="card border-0 shadow">
    <div class="card-body text-center p-4">
        <div class="fs-1 mb-3">🔗</div>
        <h5 class="fw-bold mb-2">외부 페이지로 이동합니다</h5>
        <p class="text-muted small mb-1">{{ title }}</p>
        <p class="text-muted small mb-3" style="word-break:break-all;">{{ url[:80] }}{% if url|length > 80 %}...{% endif %}</p>
        <div class="d-grid gap-2">
            <a href="{{ url }}" target="_blank" class="btn btn-primary" id="goBtn">이동하기 (3초)</a>
            <a href="{{ back }}" class="btn btn-outline-secondary">← 돌아가기</a>
        </div>
        <small class="text-muted d-block mt-3">열린 페이지를 닫으면 이전 화면으로 돌아옵니다.</small>
    </div>
</div>
<script>
let sec = 3;
const btn = document.getElementById('goBtn');
const timer = setInterval(() => {
    sec--;
    btn.textContent = '이동하기 (' + sec + '초)';
    if (sec <= 0) {
        clearInterval(timer);
        window.open('{{ url }}', '_blank');
        btn.textContent = '이동 완료';
    }
}, 1000);
btn.addEventListener('click', (e) => {
    e.preventDefault();
    clearInterval(timer);
    window.open('{{ url }}', '_blank');
    btn.textContent = '이동 완료';
});
</script>
</body>
</html>
