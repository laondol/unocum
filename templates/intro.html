{% extends 'layout.html' %}
{% block content %}
<div class="text-center py-5 mb-5" style="background: linear-gradient(135deg, #e8f5e9 0%, #ffffff 100%); border-radius: 35px; padding: 100px 20px !important;">
    <span class="badge bg-success-subtle text-success px-3 py-2 rounded-pill fw-bold mb-3">YANGPYEONG COMMUNITY PLATFORM</span>
    <h1 class="display-3 fw-bold mb-3" style="letter-spacing: -2px;">이웃이 제안하고,<br>공동체가 실현하는 <span class="text-success">양평 자치</span></h1>
    <div class="d-flex justify-content-center gap-3 flex-wrap">
        <a href="/main" class="btn btn-success btn-lg px-5 py-3 fw-bold shadow">꿈꾸기</a>
        <a href="/presentation" class="btn btn-outline-dark btn-lg px-5 py-3">비전 프레젠테이션(IR)</a>
        <a href="/share-report" class="btn btn-warning btn-lg px-5 py-3 fw-bold shadow">📸 공유하기</a>
    </div>
</div>

<div class="row g-3 mb-5">
    <div class="col-md-6">
        <a href="/kr-yp-news" class="text-decoration-none">
            <div class="card border-0 shadow-sm p-4 text-center h-100" style="border-radius: 20px; background: linear-gradient(135deg, #e3f2fd, #fff);">
                <h5 class="fw-bold text-primary mb-2">🇰🇷 대한민국과 양평</h5>
                <p class="small text-muted">양평과 대한민국의 소식을 전합니다</p>
            </div>
        </a>
    </div>
    <div class="col-md-6">
        <a href="/world-news" class="text-decoration-none">
            <div class="card border-0 shadow-sm p-4 text-center h-100" style="border-radius: 20px; background: linear-gradient(135deg, #e8f5e9, #fff);">
                <h5 class="fw-bold text-success mb-2">🌍 세계와 양평</h5>
                <p class="small text-muted">세계 뉴스 속의 양평을 만나보세요</p>
            </div>
        </a>
    </div>
</div>
{% endblock %}
