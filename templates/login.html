{% extends 'layout.html' %}
{% block content %}
<div class="container-xl">
<div class="row justify-content-center py-5">
    <div class="col-lg-8 col-xl-7">
        <div class="card p-5 shadow-lg border-0 bg-white" style="border-radius: 25px;">
            <div class="text-center mb-4">
                <span class="fs-1">🌳</span>
                <h3 class="fw-bold mt-2 text-success">함께사는양평 로그인</h3>
                <p class="text-muted small">양평의 맑은 소통에 참여하세요.</p>
            </div>

            <!-- 일반 아이디 로그인 -->
            {% if error %}
            <div class="alert alert-danger text-center py-2 mb-3" style="border-radius: 12px;">{{ error }}</div>
            {% endif %}
            <form action="/login" method="post" onsubmit="document.getElementById('loginOverlay').style.display='flex'; this.querySelector('button[type=submit]').disabled=true;">
                <input type="hidden" name="next" value="{{ next }}">
                <div class="mb-3">
                    <input type="text" name="username" class="form-control p-3 border-0 bg-light" placeholder="이메일" style="border-radius: 12px;" required>
                </div>
                <div class="mb-4">
                    <input type="password" name="password" class="form-control p-3 border-0 bg-light" placeholder="비밀번호" style="border-radius: 12px;" required>
                </div>
                <button type="submit" class="btn btn-success w-100 p-3 fw-bold mb-3 no-once" style="border-radius: 12px;">로그인</button>
            </form>

            <div class="text-center mt-2">
                <a href="/reset-password" class="text-muted small text-decoration-none">🔑 비밀번호 찾기</a>
            </div>
            <div class="text-center mt-2">
                <span class="text-muted small">아직 회원이 아니신가요? </span>
                <a href="/register" class="text-success fw-bold small text-decoration-none ms-1">회원 가입하기</a>
            </div>
            <div class="text-center mt-2">
                <a href="/terms" class="text-muted small text-decoration-none">📋 회원약관 및 닢 규칙</a>
            </div>
        </div>
    </div>
</div>
</div>
<div id="loginOverlay" style="display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(255,255,255,0.7);backdrop-filter:blur(4px);z-index:9999;align-items:center;justify-content:center;flex-direction:column;">
    <div class="spinner-border text-success" style="width:3rem;height:3rem;" role="status"></div>
    <div class="mt-2 text-muted small">로그인 중...</div>
</div>
{% endblock %}
