{% extends 'layout.html' %}
{% block content %}
<div class="row justify-content-center py-5">
    <div class="col-md-5 col-lg-4">
        <div class="card p-5 shadow-lg border-0 bg-white" style="border-radius: 25px;">
            <div class="text-center mb-4">
                <span class="fs-1">🌳</span>
                <h3 class="fw-bold mt-2 text-success">함께사는양평 로그인</h3>
                <p class="text-muted small">양평의 맑은 소통에 참여하세요.</p>
            </div>

            <!-- 1. 카카오/네이버 간편로그인 (메인 강조) -->
            <div class="d-flex flex-column gap-2 mb-4">
                <button type="button" class="btn w-100 fw-bold d-flex align-items-center justify-content-center p-3" 
                        style="background-color: #FEE500; color: #191919; border: none; border-radius: 12px; font-size: 0.95rem;"
                        onclick="alert('카카오 로그인 API와 연동 테스트 중입니다.')">
                    <span class="me-2">💬</span> 카카오로 시작하기
                </button>
                <button type="button" class="btn w-100 fw-bold text-white d-flex align-items-center justify-content-center p-3" 
                        style="background-color: #03C75A; border: none; border-radius: 12px; font-size: 0.95rem;"
                        onclick="alert('네이버 로그인 API와 연동 테스트 중입니다.')">
                    <span class="me-2">N</span> 네이버로 시작하기
                </button>
            </div>

            <div class="d-flex align-items-center my-3 text-muted">
                <hr class="flex-grow-1">
                <span class="mx-2 small">또는 일반 아이디 로그인</span>
                <hr class="flex-grow-1">
            </div>

            <!-- 2. 일반 아이디 로그인 (보조) -->
            <form action="/login" method="post">
                <input type="hidden" name="next" value="{{ next }}">
                <div class="mb-3">
                    <input type="text" name="username" class="form-control p-3 border-0 bg-light" placeholder="아이디" style="border-radius: 12px;" required>
                </div>
                <div class="mb-4">
                    <input type="password" name="password" class="form-control p-3 border-0 bg-light" placeholder="비밀번호" style="border-radius: 12px;" required>
                </div>
                <button class="btn btn-success w-100 p-3 fw-bold mb-3" style="border-radius: 12px;">로그인</button>
            </form>

            <div class="text-center mt-2">
                <span class="text-muted small">아직 회원이 아니신가요? </span>
                <a href="/register" class="text-success fw-bold small text-decoration-none ms-1">이웃 가입하기</a>
            </div>
        </div>
    </div>
</div>
{% endblock %}
