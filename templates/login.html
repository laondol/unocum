{% extends 'layout.html' %}
{% block content %}
<div class="row justify-content-center py-5">
    <div class="col-md-5 col-lg-4">
        <div class="card p-5 shadow-lg border-0 bg-white" style="border-radius: 25px;">
            <div class="text-center mb-4">
                <span class="fs-1">🌳</span>
                <h3 class="fw-bold mt-2 text-success">함께사는양평 로그인</h3>
                <p class="text-muted small">양평의 맑은 소통에 참여하세요.</p>
            </div>

            <!-- 일반 아이디 로그인 -->
            <form id="loginForm" action="/login" method="post">
                <input type="hidden" name="next" value="{{ next }}">
                <input type="hidden" name="lat" id="loginLat" value="">
                <input type="hidden" name="lon" id="loginLon" value="">
                <div class="mb-3">
                    <input type="text" name="username" class="form-control p-3 border-0 bg-light" placeholder="이메일" style="border-radius: 12px;" required>
                </div>
                <div class="mb-4">
                    <input type="password" name="password" class="form-control p-3 border-0 bg-light" placeholder="비밀번호" style="border-radius: 12px;" required>
                </div>
                <button class="btn btn-success w-100 p-3 fw-bold mb-3" style="border-radius: 12px;">로그인</button>
            </form>
            <script>
            document.getElementById('loginForm').addEventListener('submit', function(e) {
                e.preventDefault();
                const form = this;
                function doSubmit() { form.submit(); }
                if (navigator.geolocation) {
                    navigator.geolocation.getCurrentPosition(pos => {
                        document.getElementById('loginLat').value = pos.coords.latitude;
                        document.getElementById('loginLon').value = pos.coords.longitude;
                        doSubmit();
                    }, doSubmit, {enableHighAccuracy: false, timeout: 3000});
                } else { doSubmit(); }
            });
            </script>

            <div class="text-center mt-2">
                <span class="text-muted small">아직 회원이 아니신가요? </span>
                <a href="/register" class="text-success fw-bold small text-decoration-none ms-1">이웃 가입하기</a>
            </div>
            <div class="text-center mt-2">
                <a href="/terms" class="text-muted small text-decoration-none">📋 회원약관 및 닢 규칙</a>
            </div>
        </div>
    </div>
</div>
{% endblock %}
