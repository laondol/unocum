{% extends 'layout.html' %}
{% block content %}
<div class="container py-4" style="max-width: 800px;">
    <h4 class="fw-bold mb-3">✏️ 법률상담소 페이지 편집</h4>
    <div class="card border-0 shadow-sm p-4" style="border-radius:16px;">
        <form method="post">
            <div class="mb-3">
                <label class="form-label small fw-bold">페이지 내용 (함사양표준편집기)</label>
                <textarea name="content" class="summernote-editor" rows="15">{{ page.content or '' }}</textarea>
            </div>
            <button type="submit" class="btn btn-success">저장</button>
            <a href="/service/legal" class="btn btn-outline-secondary">미리보기</a>
        </form>
    </div>
</div>
{% endblock %}
