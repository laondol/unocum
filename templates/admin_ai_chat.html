{% extends 'layout.html' %}
{% block content %}
<div class="container py-4" style="max-width: 800px;">
    <!-- Breadcrumb -->
    <nav aria-label="breadcrumb" style="font-size: 12pt;">
        <ol class="breadcrumb">
            <li class="breadcrumb-item"><a href="/intro" class="text-decoration-none text-secondary">관리</a></li>
            <li class="breadcrumb-item active fw-bold">관리자 AI</li>
        </ol>
    </nav>

    <div class="card border-0 shadow-sm mb-3" style="border-radius:16px;">
        <div class="card-header bg-white border-bottom-0 pt-3 pb-1">
            <h5 class="fw-bold mb-0">🤖 관리자 AI 어시스턴트</h5>
            <small class="text-muted">플랫폼 운영을 도와드립니다. 무엇이든 물어보세요.</small>
        </div>
        <div class="card-body p-3">
            <div id="chatMessages" class="mb-3" style="min-height:350px; max-height:500px; overflow-y:auto; border:1px solid #dee2e6; border-radius:12px; padding:12px; background:#f8f9fa;">
                <div class="text-center text-muted small py-3">
                    <div class="fs-1 mb-2">🤖</div>
                    <p>안녕하세요, 함께사는양평 관리자 AI입니다.<br>회원·게시글·공유·닢 관련 분석이나 조언이 필요하시면 말씀해 주세요.</p>
                </div>
            </div>
            <div class="d-flex gap-2">
                <input type="text" id="chatInput" class="form-control" placeholder="관리자 AI에게 물어보세요..." onkeypress="if(event.key==='Enter')sendMessage()">
                <button class="btn btn-success px-4" onclick="sendMessage()">전송</button>
            </div>
        </div>
    </div>
</div>

<style>
.msg-admin { text-align:right; margin-bottom:8px; }
.msg-admin .bubble { display:inline-block; background:#27ae60; color:white; padding:8px 14px; border-radius:16px 16px 4px 16px; max-width:75%; text-align:left; font-size:0.9rem; }
.msg-ai { text-align:left; margin-bottom:8px; }
.msg-ai .bubble { display:inline-block; background:white; border:1px solid #dee2e6; padding:8px 14px; border-radius:16px 16px 16px 4px; max-width:85%; font-size:0.9rem; }
.bubble p { margin-bottom: 4px; }
.bubble p:last-child { margin-bottom: 0; }
.bubble ul, .bubble ol { margin: 4px 0; padding-left: 18px; }
.bubble code { background:#f0f0f0; padding:1px 4px; border-radius:3px; font-size:0.85rem; }
.bubble pre { background:#2c3e50; color:#ecf0f1; padding:8px 12px; border-radius:8px; overflow-x:auto; font-size:0.8rem; }
</style>

<script>
function sendMessage() {
    var input = document.getElementById('chatInput');
    var msg = input.value.trim();
    if (!msg) return;
    var container = document.getElementById('chatMessages');
    container.innerHTML += '<div class="msg-admin"><div class="bubble">' + escapeHtml(msg) + '</div></div>';
    input.value = '';
    container.innerHTML += '<div class="msg-ai"><div class="bubble text-muted"><em>생각 중...</em></div></div>';
    container.scrollTop = container.scrollHeight;

    fetch('/admin/ai-chat/send', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({message: msg})
    })
    .then(r => r.json())
    .then(d => {
        var bubbles = container.querySelectorAll('.msg-ai .bubble');
        var last = bubbles[bubbles.length - 1];
        last.innerHTML = d.reply ? d.reply.replace(/\n/g, '<br>') : '응답 없음';
        last.classList.remove('text-muted');
        container.scrollTop = container.scrollHeight;
    })
    .catch(e => {
        var bubbles = container.querySelectorAll('.msg-ai .bubble');
        var last = bubbles[bubbles.length - 1];
        last.innerHTML = '오류: ' + e.message;
        last.classList.remove('text-muted');
    });
}

function escapeHtml(text) {
    var div = document.createElement('div');
    div.textContent = text;
    return div.innerHTML;
}
</script>
{% endblock %}
