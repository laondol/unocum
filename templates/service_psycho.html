{% extends 'layout.html' %}
{% block content %}
<div class="container py-4" style="max-width: 800px;">
    <div class="card border-0 shadow-sm" style="border-radius: 18px;">
        <div class="card-body p-4 text-center">
            <div style="font-size: 60px;">🧠</div>
            <h3 class="fw-bold mt-3">심리상담소</h3>
            <p class="text-muted">전문 심리상담 및 정서 지원 서비스</p>
            <hr>
            <div class="text-start small lh-lg">
                <p><strong>상담 분야</strong> : 우울·불안, 스트레스, 관계 갈등, 트라우마, 자존감 향상, 마음챙김</p>
                <p><strong>운영 시간</strong> : 평일 10:00 ~ 16:00</p>
                <p><strong>비용 안내</strong> : 내용에 따라 비용이 발생할 수 있습니다.</p>
            </div>
        </div>
    </div>

    <div class="row g-3 mt-3">
        <div class="col-6">
            <a href="/psycho/list" class="btn btn-outline-primary w-100 py-3 fw-bold">
                📋 심리상담 게시판<br><small class="text-muted">온라인 질의·답변</small>
            </a>
        </div>
        <div class="col-6">
            <a href="/psycho/schedule" class="btn btn-outline-success w-100 py-3 fw-bold">
                📅 방문상담 예약<br><small class="text-muted">대면 상담 신청</small>
            </a>
        </div>
    </div>

    <div class="text-center mt-3">
        <a href="/intro" class="btn btn-sm btn-outline-secondary">← 사업소개</a>
    </div>
</div>
{% endblock %}
