{% extends 'layout.html' %}
{% block content %}
<div class="container py-4" style="max-width: 700px;">
    <h4 class="fw-bold mb-3">📋 법률상담 작성</h4>
    {% if not session.get('user_id') %}
    <div id="verifySection" class="card border-0 shadow-sm p-3 mb-3" style="border-radius:12px;">
        <p class="small text-muted mb-2"><strong>📧 이메일 인증이 먼저 필요합니다.</strong></p>
        {% if session.get('email_verified_for_legal') %}
        <div class="small text-success">✅ 이메일 인증 완료</div>
        {% else %}
        <div class="input-group input-group-sm">
            <input type="email" id="verifyEmail" class="form-control" placeholder="이메일">
            <button class="btn btn-success" onclick="verifyEmail('legal')">인증하기</button>
        </div>
        <div id="verifyStatus" class="small mt-1"></div>
        {% endif %}
    </div>
    {% endif %}

    <form method="post" action="/legal/write" enctype="multipart/form-data" class="card border-0 shadow-sm p-4" style="border-radius:16px;" onsubmit="return checkSubmit()">
        <div class="mb-2">
            <label class="small fw-bold">이름</label>
            <input type="text" name="author_name" class="form-control form-control-sm" value="{{ session.get('real_name','') }}" {{ 'readonly' if session.get('real_name') else '' }} required>
        </div>
        <div class="mb-2">
            <label class="small fw-bold">이메일</label>
            <input type="email" name="email" id="postEmail" class="form-control form-control-sm" value="{{ session.get('verify_email') or session.get('email','') }}" {{ 'readonly' if session.get('email') or session.get('verify_email') else '' }} required>
        </div>
        <div class="mb-2">
            <label class="small fw-bold">제목</label>
            <input type="text" name="title" class="form-control form-control-sm" required>
        </div>

        <!-- 편집기 -->
        <label class="small fw-bold mb-1">내용</label>
        <div class="d-flex gap-1 mb-1 flex-wrap">
            <button type="button" class="btn btn-sm btn-outline-secondary" onclick="execCmd('bold')"><b>B</b></button>
            <button type="button" class="btn btn-sm btn-outline-secondary" onclick="execCmd('italic')"><i>I</i></button>
            <button type="button" class="btn btn-sm btn-outline-secondary" onclick="execCmd('underline')"><u>U</u></button>
            <button type="button" class="btn btn-sm btn-outline-secondary" onclick="execCmd('insertUnorderedList')">•목록</button>
            <button type="button" class="btn btn-sm btn-outline-secondary" onclick="execCmd('insertOrderedList')">1.목록</button>
            <button type="button" class="btn btn-sm btn-outline-secondary" id="drawBtn" title="그리기" onclick="toggleDraw()">🖌️</button>
            <button type="button" class="btn btn-sm btn-outline-secondary" onclick="insertLink()">🔗</button>
            <button type="button" class="btn btn-sm btn-outline-secondary" onclick="toggleHtml()">📝HTML</button>
        </div>

        <!-- 그리기 -->
        <div id="drawArea" style="display:none;" class="mb-2">
            <canvas id="drawCanvas" width="600" height="300" style="border:1px solid #ddd;border-radius:8px;cursor:crosshair;" 
                onmousedown="startDraw(event)" onmousemove="draw(event)" onmouseup="stopDraw()" 
                ontouchstart="startDrawTouch(event)" ontouchmove="drawTouch(event)" ontouchend="stopDraw()"></canvas>
            <div class="d-flex gap-1 mt-1">
                <input type="color" id="drawColor" value="#000000" class="form-control form-control-color" style="width:30px;height:30px;">
                <input type="range" id="drawSize" min="1" max="10" value="2" style="width:80px;">
                <button type="button" class="btn btn-sm btn-outline-danger" onclick="clearDraw()">지우기</button>
                <button type="button" class="btn btn-sm btn-primary" onclick="insertDrawing()">삽입</button>
            </div>
        </div>

        <!-- HTML 모드 -->
        <div id="htmlArea" style="display:none;" class="mb-2">
            <textarea id="htmlEditor" class="form-control form-control-sm" rows="8"></textarea>
        </div>

        <div id="editor" contenteditable="true" class="form-control mb-2" style="min-height:200px;max-height:400px;overflow-y:auto;" placeholder="내용을 작성하세요..."></div>
        <input type="hidden" name="content" id="contentInput">

        <div class="mb-3">
            <label class="small fw-bold">파일 첨부</label>
            <input type="file" name="attachment" class="form-control form-control-sm" accept="image/*,.pdf,.doc,.docx,.hwp">
        </div>

        {% if not session.get('user_id') %}
        <div class="mb-2">
            <label class="small fw-bold">비밀번호</label>
            <input type="password" name="password" class="form-control form-control-sm" placeholder="글 확인시 필요" required>
        </div>
        {% endif %}
        <button type="submit" class="btn btn-success w-100">등록</button>
        <a href="/legal/list" class="btn btn-sm btn-outline-secondary w-100 mt-2">취소</a>
    </form>
</div>

<script>
var verified = {{ 'true' if session.get('user_id') else ('true' if session.get('email_verified_for_legal') else 'false') }};
function verifyEmail(p){var email=document.getElementById('verifyEmail').value.trim();if(!email)return alert('이메일 입력');var fd=new FormData();fd.append('email',email);fd.append('redirect','/legal/write');var btn=document.querySelector('#verifySection .btn');btn.disabled=true;btn.textContent='발송 중...';fetch('/register/verify-email-button',{method:'POST',body:fd}).then(r=>r.json()).then(d=>{btn.disabled=false;btn.textContent='인증하기';if(d.status==='success'){document.getElementById('verifyStatus').innerHTML='✅ 인증 링크를 발송했습니다.<br><small class=text-muted>메일함을 확인하고 링크를 클릭해 주세요.</small>';}else alert(d.msg);}).catch(function(){btn.disabled=false;btn.textContent='인증하기';alert('오류가 발생했습니다.');});}
function checkSubmit(){if(!verified&&!{{ 'true' if session.get('user_id') else 'false' }}){alert('이메일 인증을 먼저 완료해 주세요.');return false;}document.getElementById('contentInput').value=document.getElementById('editor').innerHTML;this.querySelector('button[type=submit]').disabled=true;return true;}

function execCmd(cmd){document.execCommand(cmd,false,null);document.getElementById('editor').focus();}
function insertLink(){var url=prompt('URL:');if(url)document.execCommand('createLink',false,url);}
function toggleHtml(){var ed=document.getElementById('editor');var ha=document.getElementById('htmlArea');var ht=document.getElementById('htmlEditor');if(ha.style.display==='none'){ha.style.display='';ht.value=ed.innerHTML;ed.style.display='none';}else{ha.style.display='none';ed.innerHTML=ht.value;ed.style.display='';}}

var drawing=false,drawCtx=null;
function toggleDraw(){var da=document.getElementById('drawArea');da.style.display=da.style.display==='none'?'':'none';if(da.style.display!=='none'){var c=document.getElementById('drawCanvas');drawCtx=c.getContext('2d');drawCtx.lineWidth=2;drawCtx.strokeStyle='#000';}}
function startDraw(e){drawing=true;var r=document.getElementById('drawCanvas').getBoundingClientRect();drawCtx.beginPath();drawCtx.moveTo(e.clientX-r.left,e.clientY-r.top);}
function draw(e){if(!drawing)return;var r=document.getElementById('drawCanvas').getBoundingClientRect();drawCtx.lineWidth=document.getElementById('drawSize').value;drawCtx.strokeStyle=document.getElementById('drawColor').value;drawCtx.lineTo(e.clientX-r.left,e.clientY-r.top);drawCtx.stroke();}
function stopDraw(){drawing=false;}
function startDrawTouch(e){e.preventDefault();var t=e.touches[0];var c=document.getElementById('drawCanvas');var r=c.getBoundingClientRect();drawing=true;drawCtx.beginPath();drawCtx.moveTo(t.clientX-r.left,t.clientY-r.top);}
function drawTouch(e){e.preventDefault();if(!drawing)return;var t=e.touches[0];var c=document.getElementById('drawCanvas');var r=c.getBoundingClientRect();drawCtx.lineWidth=document.getElementById('drawSize').value;drawCtx.strokeStyle=document.getElementById('drawColor').value;drawCtx.lineTo(t.clientX-r.left,t.clientY-r.top);drawCtx.stroke();}
function clearDraw(){drawCtx.clearRect(0,0,600,300);}
function insertDrawing(){var data=document.getElementById('drawCanvas').toDataURL();document.execCommand('insertImage',false,data);toggleDraw();document.getElementById('editor').focus();}
</script>
{% endblock %}
