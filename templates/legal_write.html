{% extends 'layout.html' %}
{% block content %}
<div class="container py-4" style="max-width: 700px;">
    <h4 class="fw-bold mb-3">📋 법률상담 작성</h4>
    {% if not session.get('user_id') %}
    <div id="verifySection" class="card border-0 shadow-sm p-3 mb-3" style="border-radius:12px;">
        <p class="small text-muted mb-2"><strong>📧 이메일 인증이 먼저 필요합니다.</strong></p>
        <div class="input-group input-group-sm">
            <input type="email" id="verifyEmail" class="form-control" placeholder="이메일">
            <button class="btn btn-success" onclick="sendVerify('legal')">인증코드 받기</button>
        </div>
        <div class="input-group input-group-sm mt-1" id="codeSection" style="display:none;">
            <input type="text" id="verifyCode" class="form-control" placeholder="인증코드 6자리" maxlength="6">
            <button class="btn btn-outline-success" onclick="checkVerify('legal')">확인</button>
        </div>
        <div id="verifyStatus" class="small mt-1"></div>
    </div>
    {% endif %}

    <form method="post" action="/legal/write" class="card border-0 shadow-sm p-4" style="border-radius:16px;" onsubmit="return checkSubmit()">
        <div class="mb-2">
            <label class="small fw-bold">이름</label>
            <input type="text" name="author_name" class="form-control form-control-sm" value="{{ session.get('real_name','') }}" {{ 'readonly' if session.get('real_name') else '' }} required>
        </div>
        <div class="mb-2">
            <label class="small fw-bold">이메일</label>
            <input type="email" name="email" id="postEmail" class="form-control form-control-sm" value="{{ session.get('email','') }}" {{ 'readonly' if session.get('email') else '' }} required>
        </div>
        <div class="mb-2">
            <label class="small fw-bold">제목</label>
            <input type="text" name="title" class="form-control form-control-sm" required>
        </div>
        <div class="mb-3">
            <label class="small fw-bold">내용</label>
            <textarea name="content" class="form-control form-control-sm" rows="8" required></textarea>
        </div>
        <button class="btn btn-success w-100">등록</button>
        <a href="/legal/list" class="btn btn-sm btn-outline-secondary w-100 mt-2">취소</a>
    </form>
</div>
<script>
var verified = {{ 'true' if session.get('user_id') else 'false' }};
function sendVerify(p){var email=document.getElementById('verifyEmail').value.trim();if(!email)return alert('이메일 입력');var fd=new FormData();fd.append('email',email);fd.append('purpose',p||'legal');fetch('/register/send-code',{method:'POST',body:fd}).then(r=>r.json()).then(d=>{document.getElementById('verifyStatus').innerHTML=d.msg;if(d.status==='success')document.getElementById('codeSection').style.display='';});}
function checkVerify(p){var code=document.getElementById('verifyCode').value.trim();var fd=new FormData();fd.append('code',code);fd.append('purpose',p||'legal');fetch('/register/verify-code',{method:'POST',body:fd}).then(r=>r.json()).then(d=>{if(d.status==='success'){verified=true;document.getElementById('postEmail').value=document.getElementById('verifyEmail').value;document.getElementById('verifyStatus').innerHTML='✅ 인증완료';}else alert(d.msg);});}
function checkSubmit(){if(!verified&&!{{ 'true' if session.get('user_id') else 'false' }}){alert('이메일 인증을 먼저 완료해 주세요.');return false;}return true;}
</script>
{% endblock %}
