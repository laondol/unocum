{% extends 'layout.html' %}
{% block content %}
<div class="container mt-4" style="max-width: 900px;">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h4 class="fw-bold mb-0">{{ '✏️ 뉴스 수정' if article else '📝 새 뉴스 작성' }}</h4>
        <a href="/admin/news" class="btn btn-outline-secondary btn-sm">← 목록</a>
    </div>

    <form method="POST" enctype="multipart/form-data" class="card border-0 shadow-sm p-4">
        <div class="mb-3">
            <label class="form-label fw-bold">제목 *</label>
            <input type="text" name="title" class="form-control form-control-lg" required
                   value="{{ article.title if article else '' }}" placeholder="뉴스 제목">
        </div>

        <div class="row mb-3">
            <div class="col-md-6">
                <label class="form-label fw-bold">분류</label>
                <select name="category" class="form-select">
                    {% for cat in ['세계뉴스', '대한민국뉴스', '양평소식', '지역소식', '정책정보', '농업정보', '관광소식', '환경뉴스', '복지정보', '건강정보'] %}
                    <option value="{{ cat }}" {{ 'selected' if article and article.category == cat }}>{{ cat }}</option>
                    {% endfor %}
                </select>
            </div>
            <div class="col-md-6">
                <label class="form-label fw-bold">출처</label>
                <input type="text" name="source_name" class="form-control" placeholder="뉴스 출처명"
                       value="{{ article.source_name if article else '' }}">
            </div>
        </div>

        <div class="mb-3">
            <label class="form-label fw-bold">AI 선정 이유 (있는 경우 표시)</label>
            <textarea name="ai_reason" class="form-control" rows="2" placeholder="AI가 이 뉴스를 선정한 이유">{{ article.ai_reason if article else '' }}</textarea>
        </div>

        <div class="mb-3">
            <label class="form-label fw-bold">요약 (intro에 표시됩니다)</label>
            <textarea name="summary" class="summernote-editor form-control" rows="3" placeholder="3줄 요약">{{ article.summary if article else '' }}</textarea>
        </div>

        <div class="mb-3">
            <div class="d-flex justify-content-between align-items-center">
                <label class="form-label fw-bold mb-0">본문 (HTML 지원)</label>
                {% if article and article.source_url %}
                <a href="/admin/news/edit/{{ article.id }}?translate=1" class="btn btn-sm btn-outline-info">🌐 원문 번역하기</a>
                {% endif %}
            </div>
            <textarea name="content" class="summernote-editor form-control" rows="12" placeholder="본문 내용을 입력하세요.">{{ translated or (article.content if article else '') }}</textarea>
        </div>

        <div class="row mb-3">
            <div class="col-md-6">
                <label class="form-label fw-bold">대표 이미지</label>
                <input type="file" name="image" class="form-control" accept="image/*">
                {% if article and article.image_path %}
                <div class="mt-2">
                    <img src="{{ article.image_path }}" style="max-height:100px;" class="rounded">
                    <span class="text-muted small ms-2">기존 이미지 (새 파일 업로드 시 교체)</span>
                </div>
                {% endif %}
            </div>
            <div class="col-md-6">
                <label class="form-label fw-bold">원본 URL</label>
                <input type="url" name="source_url" class="form-control" placeholder="https://..."
                       value="{{ article.source_url if article else '' }}">
            </div>
        </div>

        <div class="form-check mb-4">
            <input type="checkbox" name="is_selected" class="form-check-input" id="chkSelect"
                   {{ 'checked' if article and article.is_selected }}>
            <label class="form-check-label fw-bold" for="chkSelect">✅ intro 페이지에 표시</label>
        </div>

        <div class="d-flex gap-2">
            <button type="submit" class="btn btn-success px-5 py-2 fw-bold">
                {{ '수정 완료' if article else '등록하기' }}
            </button>
            <a href="/admin/news" class="btn btn-outline-secondary px-4 py-2">취소</a>
        </div>
    </form>
</div>
{% endblock %}
