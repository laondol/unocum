{% extends 'layout.html' %}
{% block content %}
<div class="container-xl">
<div class="row justify-content-center py-5">
    <div class="col-lg-8 col-xl-7">
        <div class="card p-5 shadow-lg border-0 bg-white" style="border-radius: 25px;">
            <div class="text-center mb-4">
                <span class="fs-1">🔑</span>
                <h3 class="fw-bold mt-2 text-success">비밀번호 찾기</h3>
                <p class="text-muted small">가입한 이메일로 재설정 링크를 보내드립니다.</p>
            </div>
            <div class="mb-3">
                <input type="email" id="resetEmail" class="form-control p-3 border-0 bg-light" placeholder="이메일" style="border-radius:12px;">
            </div>
            <button class="btn btn-success w-100 py-3 fw-bold mb-2" onclick="sendReset()" style="border-radius:12px;">재설정 링크 받기</button>
            <div id="resetStatus" class="small text-center mt-2"></div>
            <div class="text-center mt-3">
                <a href="/login" class="text-muted small text-decoration-none">← 로그인으로</a>
            </div>
        </div>
    </div>
</div>
</div>
<script>
function sendReset() {
    var email = document.getElementById('resetEmail').value.trim();
    if (!email) return alert('이메일을 입력하세요.');
    document.getElementById('resetStatus').innerHTML = '<span class="text-muted">전송 중...</span>';
    fetch('/reset-password/send', {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({email})})
    .then(r=>r.json()).then(d=>{
        document.getElementById('resetStatus').innerHTML = '<span class="'+(d.status==='success'?'text-success':'text-danger')+'">'+d.msg+'</span>';
    });
}
</script>
{% endblock %}
