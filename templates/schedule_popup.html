<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>일정 관리</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<style>body{background:#f8f9fa;}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:2px;}
.cal-header{text-align:center;font-size:0.75rem;font-weight:bold;color:#6c757d;padding:4px;}
.cal-day{text-align:center;padding:8px 4px;border-radius:8px;cursor:pointer;font-size:0.85rem;}
.cal-day:hover{background:#e9ecef;}
.cal-day.today{background:#0d6efd;color:#fff;font-weight:bold;}
.cal-day.other{color:#ccc;}
.cal-day.has-event::after{content:'';display:block;width:5px;height:5px;background:#198754;border-radius:50%;margin:2px auto 0;}
.cal-day.today.has-event::after{background:#fff;}
</style>
</head>
<body>
<div class="container py-3" style="max-width:700px;">
    <div class="d-flex justify-content-between align-items-center mb-3">
        <h5 class="fw-bold mb-0">📅 일정 관리</h5>
        <a href="#" onclick="window.close(); return false;" class="btn btn-sm btn-outline-secondary">✕ 닫기</a>
    </div>

    <div class="row g-3">
        <div class="col-4">
            <h6 class="small text-muted">👥 벗 <span id="friendCount"></span></h6>
            <div id="friendList" class="list-group small" style="max-height:400px;overflow-y:auto;">불러오는 중...</div>
        </div>
        <div class="col-8">
            <ul class="nav nav-tabs mb-3" id="schedTabs">
        <li class="nav-item"><a class="nav-link active" href="#" data-tab="view">📅 달력</a></li>
        <li class="nav-item"><a class="nav-link" href="#" data-tab="add">➕ 추가</a></li>
        <li class="nav-item"><a class="nav-link" href="#" data-tab="find">🔍 빈 시간</a></li>
    </ul>

    <!-- 달력 탭 -->
    <div id="tabView">
        <div class="d-flex justify-content-between align-items-center mb-2">
            <button class="btn btn-sm btn-outline-secondary" onclick="changeMonth(-1)">◀</button>
            <span class="fw-bold" id="calTitle"></span>
            <button class="btn btn-sm btn-outline-secondary" onclick="changeMonth(1)">▶</button>
        </div>
        <div class="cal-grid">
            <div class="cal-header">일</div><div class="cal-header">월</div><div class="cal-header">화</div>
            <div class="cal-header">수</div><div class="cal-header">목</div><div class="cal-header">금</div><div class="cal-header">토</div>
        </div>
        <div class="cal-grid" id="calGrid"></div>
        <div class="mt-3" id="dayEvents"></div>
    </div>

    <!-- 추가 탭 -->
    <div id="tabAdd" style="display:none;">
        <input type="text" id="addTitle" class="form-control mb-2" placeholder="일정 제목">
        <textarea id="addDesc" class="form-control mb-2" rows="2" placeholder="설명 (선택)"></textarea>
        <div class="row g-2 mb-2">
            <div class="col-6"><input type="date" id="addDate" class="form-control"></div>
            <div class="col-3"><input type="time" id="addStart" class="form-control" value="09:00"></div>
            <div class="col-3"><input type="time" id="addEnd" class="form-control" value="10:00"></div>
        </div>
        <button class="btn btn-primary w-100" onclick="addEvent()">일정 등록</button>
        <hr>
        <div id="eventList" class="small"></div>
    </div>

    <!-- 빈 시간 찾기 -->
    <div id="tabFind" style="display:none;">
        <input type="text" id="findTitle" class="form-control mb-2" placeholder="약속 제목 (예: 회의, 점심)">
        <div class="row g-2 mb-2">
            <div class="col-6"><input type="date" id="findDate" class="form-control"></div>
            <div class="col-3"><input type="number" id="findDuration" class="form-control" placeholder="분" value="60" min="30" step="30"></div>
            <div class="col-3"><button class="btn btn-primary w-100" onclick="findSlots()">찾기</button></div>
        </div>
        <div id="slotResult" class="small"></div>
    </div>
        <div id="slotResult" class="small">        </div>
    </div>
    </div></div>

<script>
let calYear, calMonth, schedules = [];

document.querySelectorAll('#schedTabs .nav-link').forEach(t => {
    t.addEventListener('click', function(e) {
        e.preventDefault();
        document.querySelectorAll('#schedTabs .nav-link').forEach(x => x.classList.remove('active'));
        this.classList.add('active');
        ['tabView','tabAdd','tabFind'].forEach(id => document.getElementById(id).style.display='none');
        document.getElementById('tab' + this.dataset.tab.charAt(0).toUpperCase() + this.dataset.tab.slice(1)).style.display = '';
        if (this.dataset.tab === 'view') renderCal();
        if (this.dataset.tab === 'add') { document.getElementById('addDate').value = new Date().toISOString().slice(0,10); loadEvents(); }
        if (this.dataset.tab === 'find') document.getElementById('findDate').value = new Date().toISOString().slice(0,10);
    });
});

function loadEvents() {
    fetch('/api/bot/schedule').then(r=>r.json()).then(d => {
        schedules = d.schedules || [];
        renderEventList();
    });
}

function renderEventList() {
    const el = document.getElementById('eventList');
    if (schedules.length === 0) { el.innerHTML = '<div class="text-muted">등록된 일정이 없습니다.</div>'; return; }
    el.innerHTML = schedules.map(s => '<div class="d-flex justify-content-between border-bottom py-1"><span><strong>'+s.title+'</strong><br><small>'+s.event_date+'</small></span><button class="btn btn-sm btn-outline-danger" onclick="deleteEvent('+s.id+')">✕</button></div>').join('');
}

function renderCal() {
    const now = new Date();
    if (!calYear) { calYear = now.getFullYear(); calMonth = now.getMonth() + 1; }
    document.getElementById('calTitle').textContent = calYear + '년 ' + calMonth + '월';
    const firstDay = new Date(calYear, calMonth-1, 1).getDay();
    const lastDate = new Date(calYear, calMonth, 0).getDate();
    let html = '';
    for (let i = 0; i < firstDay; i++) html += '<div></div>';
    for (let d = 1; d <= lastDate; d++) {
        const dateStr = calYear+'-'+String(calMonth).padStart(2,'0')+'-'+String(d).padStart(2,'0');
        const today = now.getFullYear()===calYear && now.getMonth()+1===calMonth && now.getDate()===d;
        const hasEvent = schedules.some(s => s.event_date && s.event_date.startsWith(dateStr));
        html += '<div class="cal-day '+(today?'today':'')+' '+(hasEvent?'has-event':'')+'" onclick="showDay(\''+dateStr+'\')">'+d+'</div>';
    }
    // 빈칸 채우기
    const remaining = (7 - ((firstDay + lastDate) % 7)) % 7;
    for (let i = 0; i < remaining; i++) html += '<div class="cal-day other"></div>';
    document.getElementById('calGrid').innerHTML = html;
}

function showDay(date) {
    const dayScheds = schedules.filter(s => s.event_date && s.event_date.startsWith(date));
    const el = document.getElementById('dayEvents');
    if (dayScheds.length === 0) { el.innerHTML = '<div class="text-muted small">'+date+' - 일정 없음</div>'; return; }
    el.innerHTML = '<strong class="small">'+date+'</strong>'+dayScheds.map(s => '<div class="small border-bottom py-1">🕐 '+s.event_date.split(' ')[1]+' - '+s.title+'</div>').join('');
}

function changeMonth(d) {
    calMonth += d;
    if (calMonth > 12) { calMonth = 1; calYear++; }
    if (calMonth < 1) { calMonth = 12; calYear--; }
    renderCal();
}

function addEvent() {
    const title = document.getElementById('addTitle').value.trim();
    const date = document.getElementById('addDate').value;
    const start = document.getElementById('addStart').value;
    if (!title || !date || !start) return alert('제목, 날짜, 시간을 입력하세요.');
    const eventDate = date + ' ' + start + ':00';
    const checked = document.querySelectorAll('.friend-check:checked');
    const invited = Array.from(checked).map(c=>parseInt(c.value)).join(',');
    fetch('/api/bot/schedule', {method:'POST', headers:{'Content-Type':'application/json'},
        body:JSON.stringify({title, description:document.getElementById('addDesc').value, event_date:eventDate, invited})})
    .then(r=>r.json()).then(d => { if(d.success) { alert('등록 완료'); loadEvents(); } });
}

function deleteEvent(id) {
    if (!confirm('삭제하시겠습니까?')) return;
    fetch('/api/bot/schedule/delete', {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({id})})
    .then(r=>r.json()).then(d => { if(d.success) loadEvents(); });
}

function findSlots() {
    const date = document.getElementById('findDate').value;
    const dur = parseInt(document.getElementById('findDuration').value) || 60;
    const title = document.getElementById('findTitle').value.trim() || '약속';
    if (!date) return alert('날짜를 선택하세요.');
    const checked = document.querySelectorAll('.friend-check:checked');
    const fids = Array.from(checked).map(c=>c.value);
    if (fids.length === 0) {
        findMySlots(date, dur);
        return;
    }
    fetch('/api/bot/schedule/common', {
        method:'POST', headers:{'Content-Type':'application/json'},
        body:JSON.stringify({date, duration: dur, friend_ids: fids})
    }).then(r=>r.json()).then(d => {
        const el = document.getElementById('slotResult');
        if (!d.slots||d.slots.length===0) el.innerHTML = '<div class="text-muted py-2">'+d.friend_count+'명 모두 '+dur+'분 이상 가능한 시간이 없습니다.</div>';
        else el.innerHTML = '<div class="alert alert-success py-2"><strong>🔍 '+date+' ('+d.friend_count+'명)</strong><br>'
            + d.slots.slice(0,3).map((s,i)=>
                '✅ #'+(i+1)+' '+s.time+' ~ '+s.free_min+'분 '
                + '<button class="btn btn-sm btn-primary py-0" onclick="sendAppt(\''+title+'\',\''+date+'\',\''+s.time+'\','+dur+',['+fids+'])">📨 보내기</button>'
            ).join('<br>')+'</div>';
    });
}

function sendAppt(title, date, time, dur, fids) {
    if (!confirm(title + '\n' + date + ' ' + time + ' (' + dur + '분)\n\n벗들에게 약속을 제안할까요?')) return;
    fetch('/api/bot/schedule/invite', {
        method:'POST', headers:{'Content-Type':'application/json'},
        body:JSON.stringify({title, date, time, duration: dur, friend_ids: fids})
    }).then(r=>r.json()).then(d => {
        if (d.success) alert(d.msg || '약속 제안을 보냈습니다!');
        else alert(d.error||'실패');
    });
}

function findMySlots(date, dur) {
    const dayScheds = schedules.filter(s => s.event_date && s.event_date.startsWith(date))
        .map(s => { const t = s.event_date.split(' ')[1]; return t ? t.substring(0,5) : ''; }).filter(t=>t).sort();
    const results = [];
    for (let h = 6; h < 23; h++) {
        for (let m = 0; m < 60; m += 30) {
            const time = String(h).padStart(2,'0')+':'+String(m).padStart(2,'0');
            if (dayScheds.includes(time)) continue;
            let freeMin = 0, tm = h*60+m;
            while (tm < 23*60 && !dayScheds.includes(String(Math.floor(tm/60)).padStart(2,'0')+':'+String(tm%60).padStart(2,'0'))) { freeMin += 30; tm += 30; }
            if (freeMin >= dur) { results.push(time + ' ~ ' + freeMin + '분 가능'); h = 23; break; }
        }
    }
    const el = document.getElementById('slotResult');
    if (results.length === 0) el.innerHTML = '<div class="text-muted py-2">'+dur+'분 이상 빈 시간이 없습니다.</div>';
    else el.innerHTML = '<div class="alert alert-success py-2"><strong>🔍 '+date+'</strong><br>'+results.map(r=>'✅ '+r).join('<br>')+'</div>';
}

document.addEventListener('DOMContentLoaded', function() {
    loadEvents();
    renderCal();
    loadFriendList();
});

function loadFriendList() {
    fetch('/api/chat/friends').then(r=>r.json()).then(d=>{
        const el = document.getElementById('friendList');
        document.getElementById('friendCount').textContent = '(' + (d.friends ? d.friends.length : 0) + ')';
        if (!d.friends||d.friends.length===0) { el.innerHTML='<div class="text-muted py-2">아직 벗이 없습니다.<br><small>프로필에서 벗 신청을 해보세요!</small></div>'; return; }
        el.innerHTML = d.friends.map(f=>'<label class="list-group-item"><input type="checkbox" class="friend-check" value="'+f.id+'"> '+f.name+' <small class="text-muted">@'+f.username+'</small></label>').join('');
    });
}
</script>
</body>
</html>
