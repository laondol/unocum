<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>일정 2.0</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<style>
body{background:#f8f9fa;font-size:0.9rem;}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:2px;}
.cal-header{text-align:center;font-size:0.75rem;font-weight:bold;color:#6c757d;padding:4px;}
.cal-day{text-align:center;padding:8px 4px;border-radius:8px;cursor:pointer;font-size:0.85rem;position:relative;}
.cal-day:hover{background:#e9ecef;}
.cal-day.today{background:#0d6efd;color:#fff;font-weight:bold;}
.cal-day::after{content:'';display:none;width:6px;height:6px;border-radius:50%;margin:3px auto 0;}
.cal-day.event-red::after{display:block;background:#dc3545;}
.cal-day.event-blue::after{display:block;background:#0d6efd;}
.cal-day.event-green::after{display:block;background:#198754;}
.cal-day.event-gray::after{display:block;background:#adb5bd;}
.cal-day.today.event-red::after,.cal-day.today.event-blue::after,.cal-day.today.event-green::after,.cal-day.today.event-gray::after{background:#fff;}
</style>
</head>
<body>
<div class="container py-3" style="max-width:800px;">
<div class="d-flex gap-2 mb-3">
    <button class="btn btn-sm btn-outline-secondary" onclick="switchTab('view')">📅 달력</button>
    <button class="btn btn-sm btn-success" onclick="switchTab('add')" id="btnAdd">➕ 일정등록</button>
</div>

<!-- 달력 탭 -->
<div id="tabView">
    <div class="d-flex justify-content-between align-items-center mb-2">
        <button class="btn btn-sm btn-outline-secondary" onclick="changeMonth(-1)">◀</button>
        <span id="calTitle" class="fw-bold"></span>
        <button class="btn btn-sm btn-outline-secondary" onclick="changeMonth(1)">▶</button>
    </div>
    <div class="cal-grid mb-2" id="calHeaders">
        <div class="cal-header">일</div><div class="cal-header">월</div><div class="cal-header">화</div><div class="cal-header">수</div><div class="cal-header">목</div><div class="cal-header">금</div><div class="cal-header">토</div>
    </div>
    <div class="cal-grid mb-3" id="calGrid"></div>
    <div id="dayEvents" class="small"></div>
</div>

<!-- 추가 탭 -->
<div id="tabAdd" style="display:none;">
    <div class="card p-3">
        <h6 class="mb-3">새 일정</h6>
        <input id="addTitle" class="form-control form-control-sm mb-2" placeholder="제목">
        <div class="row g-2 mb-2">
            <div class="col-5"><label class="small">시작일</label><input type="date" id="addDate" class="form-control form-control-sm"></div>
            <div class="col-4"><label class="small">시작시간</label><input type="time" id="addStart" class="form-control form-control-sm"></div>
            <div class="col-3 d-flex align-items-end"><label class="small mb-0"><input type="checkbox" id="addAllDay" onchange="toggleAllDay()"> 종일</label></div>
        </div>
        <div class="row g-2 mb-2">
            <div class="col-4"><label class="small">종료일</label><input type="date" id="addEndDate" class="form-control form-control-sm" onchange="toggleAccommodation()"></div>
            <div class="col-4"><label class="small">종료시간</label><input type="time" id="addEnd" class="form-control form-control-sm"></div>
            <div class="col-4 d-flex align-items-end gap-2">
                <label class="small mb-0"><input type="checkbox" id="addRepeat" onchange="toggleRepeat()"> 반복</label>
                <div id="repeatOptions" style="display:none;" class="d-flex gap-1">
                    <label class="small"><input type="radio" name="repeatType" value="daily"> 일</label>
                    <label class="small"><input type="radio" name="repeatType" value="weekly"> 주</label>
                    <label class="small"><input type="radio" name="repeatType" value="monthly"> 월</label>
                    <label class="small"><input type="radio" name="repeatType" value="yearly"> 년</label>
                </div>
            </div>
        </div>
        <input id="addLoc" class="form-control form-control-sm mb-2" placeholder="장소">
        <div id="accommodationSection" style="display:none;">
            <input id="addAccommodation" class="form-control form-control-sm mb-2" placeholder="임시숙소 주소">
        </div>
        <textarea id="addMemo" class="form-control form-control-sm mb-2" rows="2" placeholder="메모"></textarea>
        <div class="mb-2">
            <label class="small">👥 참석자</label>
            <div id="friendCheckboxes" class="small" style="max-height:100px;overflow-y:auto;"></div>
        </div>
        <input type="hidden" id="editId" value="">
        <button class="btn btn-sm btn-success w-100" id="saveBtn" onclick="saveEvent()">저장</button>
    </div>
</div>

<!-- 즐겨찾기 탭 -->
<div id="tabFav" style="display:none;">
    <div id="favList" class="small">⭐ 즐겨찾기한 일정이 여기에 표시됩니다.</div>
</div>

<!-- 리스트 탭 (숨김, 렌더링용) -->
<div id="tabList" style="display:none;"><div id="eventList" class="small"></div></div>
</div>

<script>
let calYear, calMonth, schedules = [], friends = [];

fetch('/api/chat/friends').then(r=>r.json()).then(d => {
    friends = d.friends || [];
    renderFriendCheckboxes();
});
loadEvents();
renderCal();

function renderFriendCheckboxes() {
    var box = document.getElementById('friendCheckboxes');
    if (!friends.length) { box.innerHTML = '<div class="text-muted">벗이 없습니다</div>'; return; }
    box.innerHTML = friends.map(function(f){
        var name = f.username || f.name || f;
        return '<label class="d-block"><input type="checkbox" class="friend-cb" value="'+f.id+'"> '+name+'</label>';
    }).join('');
}
renderCal();

function switchTab(t) {
    ['tabView','tabAdd','tabList','tabFav'].forEach(id => document.getElementById(id).style.display='none');
    document.getElementById('tab'+t.charAt(0).toUpperCase()+t.slice(1)).style.display = '';
    if (t === 'add') {
        if (!document.getElementById('addDate').value) {
            var today = new Date().toISOString().slice(0,10);
            document.getElementById('addDate').value = today;
            document.getElementById('addEndDate').value = today;
        }
        document.getElementById('editId').value = '';
        document.getElementById('saveBtn').textContent = '저장';
        document.querySelector('#tabAdd h6').textContent = '새 일정';
        document.getElementById('accommodationSection').style.display = 'none';
    }
}

function loadEvents() {
    return fetch('/api/bot/schedule').then(r=>r.json()).then(d => {
        schedules = d.schedules || [];
        renderCal();
        renderEventList();
        document.getElementById('dayEvents').innerHTML = '';
    });
}

function renderCal() {
    const now = new Date();
    if (!calYear) { calYear = now.getFullYear(); calMonth = now.getMonth()+1; }
    document.getElementById('calTitle').textContent = calYear+'년 '+calMonth+'월';
    const firstDay = new Date(calYear, calMonth-1, 1).getDay();
    const lastDate = new Date(calYear, calMonth, 0).getDate();
    let html = '';
    for (let i = 0; i < firstDay; i++) html += '<div></div>';
    for (let d = 1; d <= lastDate; d++) {
        const ds = calYear+'-'+String(calMonth).padStart(2,'0')+'-'+String(d).padStart(2,'0');
        const today = now.getFullYear()===calYear && now.getMonth()+1===calMonth && now.getDate()===d;
        const evts = schedules.filter(s => s.event_date && s.event_date.startsWith(ds));
        let cls = '';
        if (evts.length) {
            const colors = evts.map(s => s.color||'gray');
            if (colors.includes('red')) cls = 'event-red';
            else if (colors.includes('blue')) cls = 'event-blue';
            else if (colors.includes('green')) cls = 'event-green';
            else cls = 'event-gray';
        }
        html += '<div class="cal-day '+(today?'today ':'')+cls+'" onclick="showDay(\''+ds+'\')">'+d+'</div>';
    }
    document.getElementById('calGrid').innerHTML = html;
}

function showDay(date) {
    const evts = schedules.filter(s => s.event_date && s.event_date.startsWith(date));
    // 종일 일정 먼저 정렬
    evts.sort((a, b) => {
        const aAll = a.is_allday === true;
        const bAll = b.is_allday === true;
        if (aAll && !bAll) return -1;
        if (!aAll && bAll) return 1;
        return (a.event_date || '').localeCompare(b.event_date || '');
    });
    const el = document.getElementById('dayEvents');
    if (!evts.length) { el.innerHTML = '<div class="text-muted small py-2">일정 없음</div><button class="btn btn-sm btn-success mt-1" onclick="addOnDate(\''+date+'\')">➕ '+date+' 일정추가</button>'; return; }
    // 종일 일정 먼저 정렬
    evts.sort((a, b) => (a.is_allday === b.is_allday ? 0 : a.is_allday ? -1 : 1));
    let h = '<div class="d-flex justify-content-between align-items-center mb-2"><span class="small fw-bold">'+date+'</span><button class="btn btn-sm btn-success" onclick="addOnDate(\''+date+'\')">➕ '+date+' 일정추가</button></div>';
    evts.forEach(s => {
        const badge = {'red':'🔴','blue':'🔵','green':'🟢','gray':'⚪'}[s.color||'gray']||'⚪';
        const time = s.event_date ? s.event_date.split(' ')[1].substring(0,5) : '';
        let loc = s.location ? '<br>📍 '+s.location : '';
        var accomm = '';
        if (s.memo && s.memo.includes('[숙소:')) {
            var m = s.memo.match(/\[숙소:([^\]]+)\]/);
            if (m) accomm = '<br>🏠 숙소: '+m[1];
        }
        h += '<div class="border-bottom py-1 mb-1 small"><strong>'+badge+' '+s.title+'</strong><br>🕐 '+time+loc+accomm+'<br>';
        if ((s.title && (s.title.includes('이동') || s.title.includes('귀가'))) && s.content) {
            try {
                var r = JSON.parse(s.content);
                if (r && r.from_lat && r.to_lat) {
                    var dl = encodeURIComponent(s.departure_location || '출발');
                    var al = encodeURIComponent(s.return_location || s.location || '도착');
                    h += '<div class="d-flex gap-1 mt-1 flex-wrap">';
                    // 이동 일정: event_date=출발시간, end_date=도착시간 (서버 저장: KST)
                    var ts = s.end_date || s.event_date;
                    var arrTs = '';
                    if (ts) {
                        try {
                            var parts = ts.split(' ');
                            var dateParts = parts[0].split('-');
                            var timeParts = parts[1].split(':');
                            var year = parseInt(dateParts[0]);
                            var month = parseInt(dateParts[1]) - 1;
                            var day = parseInt(dateParts[2]);
                            var hour = parseInt(timeParts[0]);
                            var minute = parseInt(timeParts[1]);
                            // KST(UTC+9)로 해석하여 UTC 타임스탬프 생성
                            var d = new Date(Date.UTC(year, month, day, hour - 9, minute));
                            if (!isNaN(d.getTime())) arrTs = Math.floor(d.getTime()/1000);
                        } catch(e) {}
                    }
                    var fromLat = parseFloat(r.from_lat).toFixed(7);
                    var fromLng = parseFloat(r.from_lng).toFixed(7);
                    var toLat = parseFloat(r.to_lat).toFixed(7);
                    var toLng = parseFloat(r.to_lng).toFixed(7);
                    var dataParam = arrTs ? '!3m1!4b1!4m6!4m5!2m3!6e1!7e2!8j'+arrTs+'!3e3' : '!3m1!4b1!4m6!4m5!2m3!6e1!7e2!3e3';
                    h += '<a class="btn btn-sm btn-outline-danger py-0" target="_blank" href="https://www.google.co.kr/maps/dir/'+fromLat+','+fromLng+'/'+toLat+','+toLng+'/data='+dataParam+'">🌐Google</a>';
                    h += '<a class="btn btn-sm btn-outline-info py-0" target="_blank" href="https://map.naver.com/p/directions/'+r.from_lng+','+r.from_lat+','+dl+'/'+r.to_lng+','+r.to_lat+','+al+'/-/transit">🗺️네이버</a>';
                    h += '<a class="btn btn-sm btn-outline-success py-0" target="_blank" href="https://map.kakao.com/link/by/traffic/'+dl+','+r.from_lat+','+r.from_lng+'/'+al+','+r.to_lat+','+r.to_lng+'">📱카카오</a>';
                    h += '</div>';
                }
            } catch(e){}
        }
        h += '<br><button class="btn btn-sm btn-outline-secondary py-0 mt-1 me-1" onclick="editEvent('+s.id+')">✏️</button><button class="btn btn-sm btn-outline-danger py-0 mt-1" onclick="deleteEvent('+s.id+')">✕</button></div>';
    });
    el.innerHTML = h;
}

function renderEventList() {
    const el = document.getElementById('eventList');
    if (!schedules.length) { el.innerHTML = '<div class="text-muted">일정 없음</div>'; return; }
    el.innerHTML = schedules.map(s => {
        const badge = {'red':'🔴','blue':'🔵','green':'🟢','gray':'⚪'}[s.color||'gray']||'⚪';
        const time = s.event_date ? s.event_date.split(' ')[1].substring(0,5) : '';
        return '<div class="border-bottom py-1"><strong>'+badge+' '+s.title+'</strong><br><small>🕐 '+time+'</small>'+(s.location?'<br><small>📍 '+s.location+'</small>':'')+'<br><button class="btn btn-sm btn-outline-secondary mt-1 me-1" onclick="editEvent('+s.id+')">✏️</button><button class="btn btn-sm btn-outline-danger mt-1" onclick="deleteEvent('+s.id+')">✕</button></div>';
    }).join('');
}

function addOnDate(date) {
    document.getElementById('addDate').value = date;
    document.getElementById('addEndDate').value = date;
    document.getElementById('accommodationSection').style.display = 'none';
    document.getElementById('addAccommodation').value = '';
    switchTab('add');
}

function changeMonth(d) {
    calMonth += d;
    if (calMonth > 12) { calMonth = 1; calYear++; }
    if (calMonth < 1) { calMonth = 12; calYear--; }
    renderCal();
}

function editEvent(id) {
    var s = schedules.find(function(x){return x.id === id;});
    if (!s) return;
    switchTab('add');
    document.querySelector('#tabAdd h6').textContent = '일정 수정';
    document.getElementById('editId').value = id;
    document.getElementById('addTitle').value = s.title || '';
    if (s.event_date) {
        var parts = s.event_date.split(' ');
        document.getElementById('addDate').value = parts[0];
        document.getElementById('addStart').value = parts.length>1 ? parts[1].substring(0,5) : '';
        if (s.end_date) {
            var ep = s.end_date.split(' ');
            document.getElementById('addEndDate').value = ep[0];
            document.getElementById('addEnd').value = ep[1].substring(0,5);
        } else {
            document.getElementById('addEndDate').value = parts[0];
        }
    }
    document.getElementById('addLoc').value = s.location || '';
    var memoVal = s.memo || s.description || '';
    if (s.content) {
        try { var cc = JSON.parse(s.content); if (cc.compact) memoVal = cc.compact; } catch(e){}
    }
    document.getElementById('addMemo').value = memoVal.replace(/\[숙소:[^\]]+\]/,'').trim();
    var am = s.memo ? s.memo.match(/\[숙소:([^\]]+)\]/) : null;
    if (am) {
        document.getElementById('addAccommodation').value = am[1];
    } else {
        document.getElementById('addAccommodation').value = '';
    }
    if (am || (document.getElementById('addDate').value !== document.getElementById('addEndDate').value)) {
        document.getElementById('accommodationSection').style.display = '';
    } else {
        document.getElementById('accommodationSection').style.display = 'none';
    }
    document.getElementById('addAllDay').checked = s.is_allday || false;
    document.getElementById('addRepeat').checked = s.is_recurring || false;
    document.getElementById('repeatOptions').style.display = s.is_recurring ? '' : 'none';
    if (s.is_recurring && s.repeat_type) {
        var rbs = document.getElementsByName('repeatType');
        for (var i=0;i<rbs.length;i++) { rbs[i].checked = rbs[i].value === s.repeat_type; }
    }
    toggleAllDay();
    document.getElementById('saveBtn').textContent = '수정';
}

function toggleAccommodation() {
    var sd = document.getElementById('addDate').value;
    var ed = document.getElementById('addEndDate').value;
    var val = document.getElementById('addAccommodation').value.trim();
    if (sd && ed && sd !== ed) {
        document.getElementById('accommodationSection').style.display = '';
    } else if (!val) {
        document.getElementById('accommodationSection').style.display = 'none';
    }
}

function toggleAllDay() {
    var checked = document.getElementById('addAllDay').checked;
    document.getElementById('addStart').disabled = checked;
    document.getElementById('addEnd').disabled = checked;
    if (checked) {
        document.getElementById('addStart').value = '';
        document.getElementById('addEnd').value = '';
    }
}

function toggleRepeat() {
    var checked = document.getElementById('addRepeat').checked;
    document.getElementById('repeatOptions').style.display = checked ? '' : 'none';
}

function saveEvent() {
    var id = document.getElementById('editId').value;
    var title = document.getElementById('addTitle').value.trim();
    var date = document.getElementById('addDate').value;
    var endDate = document.getElementById('addEndDate').value;
    var start = document.getElementById('addStart').value;
    var end = document.getElementById('addEnd').value;
    var loc = document.getElementById('addLoc').value.trim();
    var memo = document.getElementById('addMemo').value.trim();
    var accommodation = document.getElementById('addAccommodation').value.trim();
    var isAllDay = document.getElementById('addAllDay').checked;
    var isRecurring = document.getElementById('addRepeat').checked;
    var repeatType = '';
    if (isRecurring) {
        var rbs = document.getElementsByName('repeatType');
        for (var i=0;i<rbs.length;i++) { if(rbs[i].checked) { repeatType = rbs[i].value; break; } }
    }
    if (!title || !date) return alert('제목과 날짜를 입력하세요.');
    var evt = isAllDay ? date+'T00:00' : (start ? date+'T'+start : date+'T09:00');
    if (accommodation) memo = (memo ? memo+'\n' : '')+'[숙소:'+accommodation+']';
    var cbs = document.querySelectorAll('.friend-cb:checked');
    var invited = [];
    cbs.forEach(function(cb){ invited.push(parseInt(cb.value)); });
    var data = {title, event_date: evt, location: loc, memo, invited: JSON.stringify(invited), is_allday: isAllDay, is_recurring: isRecurring, repeat_type: repeatType};
    if (end && !isAllDay) data.end_date = (endDate && endDate !== date ? endDate : date)+'T'+end;
    if (isAllDay) data.end_date = endDate ? endDate+'T23:59' : date+'T23:59';
    if (id) data.id = parseInt(id);
    var url = id ? '/api/bot/schedule/update' : '/api/bot/schedule';
    fetch(url, {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify(data)})
    .then(function(r){return r.json()}).then(function(d){
        if (d.success) {
            document.getElementById('editId').value = '';
            document.getElementById('saveBtn').textContent = '저장';
            ['addTitle','addLoc','addMemo','addStart','addEnd','addEndDate','addAccommodation'].forEach(function(x){
                var el = document.getElementById(x);
                if (el) el.value = '';
            });
            document.getElementById('addAllDay').checked = false;
            document.getElementById('addRepeat').checked = false;
            document.getElementById('repeatOptions').style.display = 'none';
            document.getElementById('addStart').disabled = false;
            document.getElementById('addEnd').disabled = false;
            alert(id?'수정 완료':'등록 완료');
            loadEvents().then(() => switchTab('view'));
        }
    });
}

function deleteEvent(id) {
    if (!confirm('삭제?')) return;
    fetch('/api/bot/schedule/delete', {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({id})})
    .then(r=>r.json()).then(d => { if(d.success) loadEvents(); });
}


</script>
</body>
</html>
