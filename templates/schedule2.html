<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>일정 2.0</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<style>
body{background:#f8f9fa;font-size:0.9rem;}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:2px;}
.cal-header{text-align:center;font-size:0.75rem;font-weight:bold;color:#6c757d;padding:4px;}
.cal-day{text-align:center;padding:8px 4px;border-radius:8px;cursor:pointer;font-size:0.85rem;position:relative;}
.cal-day:hover{background:#e9ecef;}
.cal-day.today{background:#d4f4ec;color:#0d6e5e;font-weight:bold;}
.cal-day::after{content:'';display:none;width:6px;height:6px;border-radius:50%;margin:3px auto 0;}
.cal-day.event-red::after{display:block;background:#dc3545;}
.cal-day.event-blue::after{display:block;background:#0d6efd;}
.cal-day.event-green::after{display:block;background:#198754;}
.cal-day.event-gray::after{display:block;background:#adb5bd;}
.recur-box{display:inline-block;border:2px solid #6f42c1;border-radius:4px;min-width:1.5em;padding:0 3px;line-height:1.2;font-weight:700;}
.cal-day.event-recur{background:#f3ecfd;}
.chip{display:inline-block;font-size:0.72rem;font-weight:700;padding:1px 6px;border-radius:10px;line-height:1.4;vertical-align:middle;}
.chip-move{background:#e7f1ff;color:#0d6efd;border:1px solid #b6d4ff;}
.chip-mail{background:#f1f3f5;color:#495057;border:1px solid #dee2e6;}
.evt-move{border-left:3px solid #0d6efd;}
.cal-day.today.event-red::after,.cal-day.today.event-blue::after,.cal-day.today.event-green::after,.cal-day.today.event-gray::after{background:#0d6e5e;}
.cal-day.selstart{background:#0d6efd;color:#fff;font-weight:bold;}
.cal-day.cal-sel{background:#cfe2ff;}
.cal-day.selected{background:#0d6efd;color:#fff;font-weight:bold;border-radius:50%;width:30px;height:30px;line-height:30px;margin:0 auto;}
.cal-day.selected::after{background:#fff;}
.cal-day.today.selected{background:#0d6efd;color:#fff;}
.cal-day.today.selected::after{background:#fff;}
</style>
</head>
<body>
<div class="container py-3" style="max-width:800px;">
<div class="d-flex gap-2 mb-3">
    <button class="btn btn-sm btn-outline-secondary" onclick="switchTab('view')">📅 달력</button>
    <button class="btn btn-sm btn-success" onclick="switchTab('add')" id="btnAdd">➕ 일정등록</button>
    <button class="btn btn-sm btn-outline-secondary ms-auto position-relative" onclick="toggleBell()">🔔<span id="bellBadge" class="position-absolute top-0 start-100 translate-middle badge rounded-pill bg-danger" style="display:none; font-size:0.6rem;">0</span></button>
</div>
<div id="bellPanel" class="card p-2 shadow" style="display:none; position:fixed; right:10px; top:54px; z-index:70; width:280px; max-height:60vh; overflow:auto;"></div>

<!-- 달력 탭 -->
<div id="tabView">
    <div class="d-flex justify-content-between align-items-center mb-2">
        <button class="btn btn-sm btn-outline-secondary" onclick="changeMonth(-1)">◀</button>
        <span id="calTitle" class="fw-bold"></span>
        <button class="btn btn-sm btn-outline-secondary" onclick="changeMonth(1)">▶</button>
    </div>
    <div class="cal-grid mb-2" id="calHeaders">
        <div class="cal-header">일</div><div class="cal-header">월</div><div class="cal-header">화</div><div class="cal-header">수</div><div class="cal-header">목</div><div class="cal-header">금</div><div class="cal-header">토</div>
    </div>
    <div class="cal-grid mb-3" id="calGrid"></div>
    <div id="dayEvents" class="small"></div>
</div>

<!-- 추가 탭 -->
<div id="tabAdd" style="display:none;">
    <div class="card p-3" style="position:relative">
        <h6 class="mb-3">새 일정</h6>
        <input id="addTitle" class="form-control form-control-sm mb-2" placeholder="제목">
        <div class="row g-2 mb-2">
            <div class="col-4"><label class="small d-block">시작일</label><input type="date" id="addDate" class="form-control form-control-sm" onfocus="showAddCal('start', this)" onclick="showAddCal('start', this)" onchange="toggleAccommodation();"></div>
            <div class="col-4"><label class="small d-block">시작시간</label><input type="time" id="addStart" class="form-control form-control-sm"></div>
            <div class="col-4 d-flex align-items-end"><label class="small mb-0"><input type="checkbox" id="addAllDay" onchange="toggleAllDay()"> 종일</label></div>
        </div>
        <div class="row g-2 mb-2">
            <div class="col-4"><label class="small d-block">종료일</label><input type="date" id="addEndDate" class="form-control form-control-sm" onfocus="showAddCal('end', this)" onclick="showAddCal('end', this)" onchange="toggleAccommodation();"></div>
            <div class="col-4"><label class="small d-block">종료시간</label><input type="time" id="addEnd" class="form-control form-control-sm"></div>
            <div class="col-4 d-flex align-items-end gap-2" style="position:relative;">
                <button type="button" class="btn btn-sm btn-outline-secondary" id="btnRepeat" onclick="toggleRepeat()">🔁 반복</button>
                <div id="repeatOptions" style="display:none; position:absolute; top:100%; left:0; z-index:30; background:#fff; border:1px solid #ced4da; border-radius:8px; padding:8px; box-shadow:0 4px 12px rgba(0,0,0,.15);" class="gap-1 align-items-center flex-wrap">
                    <input type="number" id="addRepeatInterval" class="form-control form-control-sm" style="width:48px;" min="1" max="365" value="1">
                    <label class="small"><input type="radio" name="repeatType" value="daily"> 매일</label>
                    <label class="small"><input type="radio" name="repeatType" value="weekly"> 매주</label>
                    <label class="small"><input type="radio" name="repeatType" value="monthly"> 매월</label>
                    <label class="small"><input type="radio" name="repeatType" value="yearly"> 매년</label>
                        <div class="border-top mt-1 pt-1 w-100">
                            <div class="small fw-bold mb-1">요일 반복 (체크 시 날짜반복 무시)</div>
                            <div class="d-flex gap-1 flex-wrap">
                                <label class="small"><input type="checkbox" class="wd-cb" value="0" onchange="updateRepeatMode()"> 월</label>
                                <label class="small"><input type="checkbox" class="wd-cb" value="1" onchange="updateRepeatMode()"> 화</label>
                                <label class="small"><input type="checkbox" class="wd-cb" value="2" onchange="updateRepeatMode()"> 수</label>
                                <label class="small"><input type="checkbox" class="wd-cb" value="3" onchange="updateRepeatMode()"> 목</label>
                                <label class="small"><input type="checkbox" class="wd-cb" value="4" onchange="updateRepeatMode()"> 금</label>
                                <label class="small"><input type="checkbox" class="wd-cb" value="5" onchange="updateRepeatMode()"> 토</label>
                                <label class="small"><input type="checkbox" class="wd-cb" value="6" onchange="updateRepeatMode()"> 일</label>
                            </div>
                            <div class="d-flex align-items-center gap-1 mt-1">
                                <span class="small">매</span>
                                <select id="addRepeatWeekOfMonth" class="form-select form-select-sm" style="width:auto;">
                                    <option value="0">매주</option>
                                    <option value="1">1번째</option>
                                    <option value="2">2번째</option>
                                    <option value="3">3번째</option>
                                    <option value="4">4번째</option>
                                    <option value="5">5번째</option>
                                </select>
                                <span class="small">요일</span>
                            </div>
                            <div class="d-flex align-items-center gap-1 mt-1">
                                <span class="small">매년</span>
                                <select id="addRepeatMonthOfYear" class="form-select form-select-sm" style="width:auto;">
                                    <option value="0">매년 아님</option>
                                    <option value="1">1월</option>
                                    <option value="2">2월</option>
                                    <option value="3">3월</option>
                                    <option value="4">4월</option>
                                    <option value="5">5월</option>
                                    <option value="6">6월</option>
                                    <option value="7">7월</option>
                                    <option value="8">8월</option>
                                    <option value="9">9월</option>
                                    <option value="10">10월</option>
                                    <option value="11">11월</option>
                                    <option value="12">12월</option>
                                </select>
                                <span class="small">에만</span>
                            </div>
                        </div>
                        <button type="button" class="btn btn-sm btn-outline-secondary py-0 px-2 ms-1" onclick="closeRepeatOptions()">확인</button>
                </div>
            </div>
        </div>
        <div class="row g-2 mb-2">
            <div class="col-6"><label class="small d-block">알림</label><select id="addReminder" class="form-control form-control-sm"><option value="0">알림 안 함</option><option value="10">10분 전</option><option value="30">30분 전</option><option value="60">1시간 전</option><option value="1440">1일 전</option></select></div>
        </div>
        <div id="addCalPopup" style="display:none; position:absolute; z-index:40; background:#fff; border:1px solid #ced4da; border-radius:8px; padding:8px; box-shadow:0 4px 12px rgba(0,0,0,.15); width:260px;">
            <div class="d-flex justify-content-between align-items-center mb-1">
                <button type="button" class="btn btn-sm btn-outline-secondary" onclick="addChangeMonth(-1)">◀</button>
                <span id="addCalTitle" class="fw-bold small"></span>
                <button type="button" class="btn btn-sm btn-outline-secondary" onclick="addChangeMonth(1)">▶</button>
            </div>
            <div class="cal-grid mb-1"><div class="cal-header">일</div><div class="cal-header">월</div><div class="cal-header">화</div><div class="cal-header">수</div><div class="cal-header">목</div><div class="cal-header">금</div><div class="cal-header">토</div></div>
            <div class="cal-grid mb-1" id="addCalGrid"></div>
            <div class="small text-muted" id="addCalHint"></div>
        </div>
        <input id="addLoc" class="form-control form-control-sm mb-2" placeholder="장소">
        <div id="accommodationSection" style="display:none;">
            <input id="addAccommodation" class="form-control form-control-sm mb-2" placeholder="임시숙소 주소">
        </div>
        <div class="mb-2">
            <label class="small d-block">메모</label>
            <div class="btn-group btn-group-sm mb-1" role="toolbar" style="flex-wrap:wrap; gap:2px;">
                <button type="button" class="btn btn-outline-secondary" onclick="memoExec('bold')"><b>B</b></button>
                <button type="button" class="btn btn-outline-secondary" onclick="memoExec('italic')"><i>I</i></button>
                <button type="button" class="btn btn-outline-secondary" onclick="memoExec('underline')"><u>U</u></button>
                <button type="button" class="btn btn-outline-secondary" onclick="memoExec('insertUnorderedList')">• 목록</button>
                <button type="button" class="btn btn-outline-secondary" onclick="memoLink()">🔗 링크</button>
                <button type="button" class="btn btn-outline-secondary" onclick="document.getElementById('memoFile').click()">🖼️첨부</button>
                <button type="button" class="btn btn-outline-secondary" onclick="openDraw()">✏️그리기</button>
                <button type="button" class="btn btn-outline-secondary" onclick="numBadgeClick()" title="선택한 숫자를 동그란 배지로">🔢 번호</button>
                <span class="small text-muted align-self-center" title="글자색">A</span>
                <input type="color" id="memoColor" value="#212529" title="글자색" style="width:30px;height:30px;padding:1px;border:1px solid #ced4da;border-radius:4px;background:#fff;cursor:pointer;" onchange="memoForeColor(this.value)">
                <span class="small text-muted align-self-center" title="배경색">▦</span>
                <input type="color" id="memoBg" value="#fff3cd" title="배경색" style="width:30px;height:30px;padding:1px;border:1px solid #ced4da;border-radius:4px;background:#fff;cursor:pointer;" onchange="memoBackColor(this.value)">
            </div>
            <div id="numPanel" style="display:none; margin:4px 0; padding:8px; border:1px solid #ced4da; border-radius:8px; background:#f8f9fa;">
                <div class="small mb-1">동그란 번호 (버스·지하철 호선 등)</div>
                <input id="numInput" class="form-control form-control-sm mb-2" style="max-width:150px;" placeholder="예: 200, 2호선">
                <div id="numColors" class="d-flex flex-wrap gap-1 mb-2"></div>
                <button type="button" class="btn btn-sm btn-success" onclick="insertNumBadge()">넣기</button>
                <button type="button" class="btn btn-sm btn-outline-secondary" onclick="toggleNumPanel()">닫기</button>
            </div>
            <div id="memoEditor" class="form-control form-control-sm" style="min-height:84px; overflow:auto;" contenteditable="true" data-ph="메모를 입력하세요"></div>
            <input type="file" id="memoFile" multiple accept="image/*,.pdf,.doc,.docx,.xls,.xlsx,.ppt,.pptx,.txt,.csv,.hwp" style="display:none;" onchange="uploadMemoFiles(this)">
        </div>
        <div class="mb-2">
            <label class="small">👥 참석자</label>
            <div id="friendCheckboxes" class="small" style="max-height:100px;overflow-y:auto;"></div>
        </div>
        <input type="hidden" id="editId" value="">
        <button type="button" class="btn btn-sm btn-success w-100" id="saveBtn" onclick="saveEvent()">저장</button>
    </div>
</div>

<!-- 즐겨찾기 탭 -->
<div id="tabFav" style="display:none;">
    <div id="favList" class="small">⭐ 즐겨찾기한 일정이 여기에 표시됩니다.</div>
</div>

<!-- 리스트 탭 (숨김, 렌더링용) -->
<div id="tabList" style="display:none;"><div id="eventList" class="small"></div></div>
</div>

<script>
let calYear, calMonth, schedules = [], friends = [], selDate = null;
function scheduleType(s){ if (s.title && (s.title.includes('이동') || s.title.includes('집으'))) return 'move'; return 'mail'; }
function typeChip(s){ return scheduleType(s)==='move' ? '<span class="chip chip-move">🚌 이동</span> ' : '<span class="chip chip-mail">✉ 메일</span> '; }
let repeatOn = false, addCalMode = 'start', addCalYear, addCalMonth;

fetch('/api/chat/friends').then(r=>r.json()).then(d => {
    friends = d.friends || [];
    renderFriendCheckboxes();
});
loadEvents();
renderCal();

function renderFriendCheckboxes() {
    var box = document.getElementById('friendCheckboxes');
    if (!friends.length) { box.innerHTML = '<div class="text-muted">벗이 없습니다</div>'; return; }
    box.innerHTML = friends.map(function(f){
        var name = f.username || f.name || f;
        return '<label class="d-block"><input type="checkbox" class="friend-cb" value="'+f.id+'"> '+name+'</label>';
    }).join('');
}
renderCal();

function switchTab(t) {
    ['tabView','tabAdd','tabList','tabFav'].forEach(id => document.getElementById(id).style.display='none');
    document.getElementById('tab'+t.charAt(0).toUpperCase()+t.slice(1)).style.display = '';
    if (t === 'add') {
        document.getElementById('editId').value = '';
        document.getElementById('saveBtn').textContent = '저장';
        document.querySelector('#tabAdd h6').textContent = '새 일정';
        document.getElementById('accommodationSection').style.display = 'none';
        repeatOn = false; setRepeatOptionsVisible(false);
        document.getElementById('addCalPopup').style.display = 'none';
        // 이전 입력값 초기화 (새 일정 진입 시)
        ['addTitle','addLoc','memoEditor','addStart','addEnd','addDate','addEndDate','addAccommodation','numInput'].forEach(function(x){ var el=document.getElementById(x); if(el) el.value=''; });
        var today = new Date().toISOString().slice(0,10);
        document.getElementById('addDate').value = today;
        document.getElementById('addEndDate').value = today;
        document.getElementById('addAllDay').checked = false;
        document.getElementById('addReminder').value = 0;
        document.getElementById('addRepeatInterval').value = 1;
        document.querySelectorAll('.wd-cb').forEach(function(cb){ cb.checked=false; });
        document.getElementById('addRepeatWeekOfMonth').value = 0;
        document.getElementById('addRepeatMonthOfYear').value = 0;
        if (document.getElementById('numPanel')) document.getElementById('numPanel').style.display='none';
        toggleAllDay();
    }
}

function loadEvents() {
    return fetch('/api/bot/schedule?_='+Date.now()).then(r=>r.json()).then(d => {
        schedules = d.schedules || [];
        renderCal();
        renderEventList();
        document.getElementById('dayEvents').innerHTML = '';
    });
}

function renderCal() {
    const now = new Date();
    if (!calYear) { calYear = now.getFullYear(); calMonth = now.getMonth()+1; }
    document.getElementById('calTitle').textContent = calYear+'년 '+calMonth+'월';
    const firstDay = new Date(calYear, calMonth-1, 1).getDay();
    const lastDate = new Date(calYear, calMonth, 0).getDate();
    let html = '';
    for (let i = 0; i < firstDay; i++) html += '<div></div>';
    for (let d = 1; d <= lastDate; d++) {
        const ds = calYear+'-'+String(calMonth).padStart(2,'0')+'-'+String(d).padStart(2,'0');
        const today = now.getFullYear()===calYear && now.getMonth()+1===calMonth && now.getDate()===d;
        const evts = schedules.filter(s => s.event_date && s.event_date.startsWith(ds));
        let cls = '';
        if (evts.length) {
            const colors = evts.map(s => s.color||'gray');
            if (colors.includes('red')) cls = 'event-red';
            else if (colors.includes('blue')) cls = 'event-blue';
            else if (colors.includes('green')) cls = 'event-green';
            else cls = 'event-gray';
        }
        const hasRecur = evts.some(s => s.is_recurring);
        const numHtml = hasRecur ? '<span class="recur-box">'+d+'</span>' : d;
        html += '<div class="cal-day '+(today?'today ':'')+cls+(hasRecur?' event-recur':'')+(ds===selDate?' selected':'')+'" onclick="showDay(\''+ds+'\')">'+numHtml+'</div>';
    }
    document.getElementById('calGrid').innerHTML = html;
}

function showDay(date) {
    selDate = date;
    renderCal();
    const evts = schedules.filter(s => s.event_date && s.event_date.startsWith(date));
    // 종일 일정 먼저 정렬
    evts.sort((a, b) => {
        const aAll = a.is_allday === true;
        const bAll = b.is_allday === true;
        if (aAll && !bAll) return -1;
        if (!aAll && bAll) return 1;
        return (a.event_date || '').localeCompare(b.event_date || '');
    });
    const el = document.getElementById('dayEvents');
    if (!evts.length) { el.innerHTML = '<div class="text-muted small py-2">일정 없음</div><button class="btn btn-sm btn-success mt-1" onclick="addOnDate(\''+date+'\')">➕ '+date+' 일정추가</button>'; return; }
    // 종일 일정 먼저 정렬
    evts.sort((a, b) => (a.is_allday === b.is_allday ? 0 : a.is_allday ? -1 : 1));
    let h = '<div class="d-flex justify-content-between align-items-center mb-2"><span class="small fw-bold">'+date+'</span><button class="btn btn-sm btn-success" onclick="addOnDate(\''+date+'\')">➕ '+date+' 일정추가</button></div>';
    evts.forEach(s => {
        const badge = {'red':'🔴','blue':'🔵','green':'🟢','gray':'⚪'}[s.color||'gray']||'⚪';
        const time = s.event_date ? s.event_date.split(' ')[1].substring(0,5) : '';
        let loc = s.location ? '<br>📍 '+s.location : '';
        var accomm = '';
        if (s.memo && s.memo.includes('[숙소:')) {
            var m = s.memo.match(/\[숙소:([^\]]+)\]/);
            if (m) accomm = '<br>🏠 숙소: '+m[1];
        }
        var repTxt = '';
        if (s.is_recurring && s.repeat_type) {
            var _rm = {'daily':'일','weekly':'주','monthly':'월','yearly':'년'}[s.repeat_type] || '';
            repTxt = ' 🔁매'+(s.repeat_interval||1)+_rm+(s.repeat_infinite ? '(무한)' : '');
        }
        h += '<div class="border-bottom py-1 mb-1 small'+(scheduleType(s)==='move'?' evt-move':'')+'"><strong>'+badge+' '+typeChip(s)+s.title+repTxt+'</strong><br>🕐 '+time+loc+accomm+'<br>';
        if ((s.title && (s.title.includes('이동') || s.title.includes('집으로'))) && s.content) {
            try {
                var r = JSON.parse(s.content);
                if (r && r.from_lat && r.to_lat) {
                    var dl = encodeURIComponent(s.departure_location || '출발');
                    var al = encodeURIComponent(s.return_location || s.location || '도착');
                    h += '<div class="d-flex gap-1 mt-1 flex-wrap">';
// 이동 일정: event_date=출발시간, end_date=도착시간 (저장시간을 UTC로 간주)
                    var ts = s.end_date || s.event_date;
                    var arrTs = '';
                    if (ts) {
                        try {
                            var parts = ts.split(' ');
                            var dateParts = parts[0].split('-');
                            var timeParts = parts[1].split(':');
                            var year = parseInt(dateParts[0]);
                            var month = parseInt(dateParts[1]) - 1;
                            var day = parseInt(dateParts[2]);
                            var hour = parseInt(timeParts[0]);
                            var minute = parseInt(timeParts[1]);
                            // 저장된 시간을 UTC로 간주 (hour - 9 안 함)
                            var d = new Date(Date.UTC(year, month, day, hour, minute));
                            if (!isNaN(d.getTime())) arrTs = Math.floor(d.getTime()/1000);
                        } catch(e) {}
                    }
                    var fromLat = parseFloat(r.from_lat).toFixed(7);
                    var fromLng = parseFloat(r.from_lng).toFixed(7);
                    var toLat = parseFloat(r.to_lat).toFixed(7);
                    var toLng = parseFloat(r.to_lng).toFixed(7);
                    var isHome = s.title && s.title.includes('집으로');
                    var dataParam;
                    if (isHome) {
                        dataParam = '!3m1!4b1!4m4!4m3!2m1!6e2!3e3';
                    } else {
                        dataParam = '!3m1!4b1!4m6!4m5!2m3!6e1!7e2!8j' + (arrTs || '') + '!3e3';
                    }

function renderAddCal() {
    const now = new Date();
    if (!addCalYear) { addCalYear = now.getFullYear(); addCalMonth = now.getMonth()+1; }
    document.getElementById('addCalTitle').textContent = addCalYear+'년 '+addCalMonth+'월';
    const firstDay = new Date(addCalYear, addCalMonth-1, 1).getDay();
    const lastDate = new Date(addCalYear, addCalMonth, 0).getDate();
    const sd = document.getElementById('addDate').value;
    const ed = document.getElementById('addEndDate').value;
    let html = '';
    for (let i = 0; i < firstDay; i++) html += '<div></div>';
    for (let d = 1; d <= lastDate; d++) {
        const ds = addCalYear+'-'+String(addCalMonth).padStart(2,'0')+'-'+String(d).padStart(2,'0');
        const isToday = now.getFullYear()===addCalYear && now.getMonth()+1===addCalMonth && now.getDate()===d;
        let cls = 'cal-day';
        if (ds === sd || ds === ed) cls += ' selstart';
        else if (sd && ed && ds > sd && ds < ed) cls += ' cal-sel';
        if (isToday) cls += ' today';
        html += '<div class="'+cls+'" onclick="addCalClick(\''+ds+'\')">'+d+'</div>';
    }
    document.getElementById('addCalGrid').innerHTML = html;

function getWeekdayMask() {

function updateRepeatMode() {

    var rbs = document.getElementsByName('repeatType');
    for (var i=0;i<rbs.length;i++) {

        // 요일 반복은 매주/매월 만 허용 (매일/매년 비활성)
        rbs[i].disabled = !!wd && (v === 'daily' || v === 'yearly');
    }
    if (wd) {
        var sel = false;
        for (var i=0;i<rbs.length;i++) { if (rbs[i].checked && !rbs[i].disabled) { sel = true; break; } }
        if (!sel) {
            for (var i=0;i<rbs.length;i++) { if (rbs[i].value === 'weekly') { rbs[i].checked = true; break; } }
        }
    }
}

let shownReminderIds = new Set();
function beep(){
  try{
    var Ctx = window.AudioContext || window.webkitAudioContext;
    if(!Ctx) return;
    var ctx = new Ctx();
    var o = ctx.createOscillator();
    var g = ctx.createGain();
    o.connect(g); g.connect(ctx.destination);
    o.type='sine'; o.frequency.value=880;
    g.gain.setValueAtTime(0.0001, ctx.currentTime);
    g.gain.exponentialRampToValueAtTime(0.3, ctx.currentTime+0.01);
    g.gain.exponentialRampToValueAtTime(0.0001, ctx.currentTime+0.5);
    o.start(); o.stop(ctx.currentTime+0.5);
  }catch(e){}
}
function fireNotification(r){
  beep();
  try{ if(navigator.vibrate) navigator.vibrate([200,100,200]); }catch(e){}
  if('Notification' in window && Notification.permission==='granted'){
    try{ new Notification(r.title, {body:(r.event_date||'')+' 알림', icon:'🔔'}); }catch(e){}
  } else {
    var t=document.createElement('div');
    t.className='toast align-items-center text-bg-primary border-0';
    t.style.cssText='position:fixed;top:60px;right:10px;z-index:80;';
    t.innerHTML='<div class="d-flex"><div class="toast-body">🔔 '+r.title+' ('+(r.event_date||'')+')</div></div>';
    document.body.appendChild(t);
    setTimeout(function(){ if(t.parentNode) t.parentNode.removeChild(t); }, 6000);
  }
  markReminderSeen([r.id]);
}

        return alert('요일 반복은 매주 또는 매월 중 하나를 선택하세요.');
    }
    if (!title || !date) return alert('제목과 날짜를 입력하세요.');
    var evt = isAllDay ? date+'T00:00' : (start ? date+'T'+start : date+'T09:00');
    if (accommodation) memo = (memo ? memo : '')+'<br>[숙소:'+accommodation+']';
    var cbs = document.querySelectorAll('.friend-cb:checked');
    var invited = [];
    cbs.forEach(function(cb){ invited.push(parseInt(cb.value)); });
    var data = {title, event_date: evt, location: loc, memo, invited: JSON.stringify(invited), is_allday: isAllDay, is_recurring: isRecurring, repeat_type: repeatType, repeat_interval: repeatInterval, repeat_infinite: repeatInfinite, repeat_weekdays: repeatWeekdays, repeat_week_of_month: repeatWeekOfMonth, repeat_month_of_year: repeatMonthOfYear, reminder_minutes: parseInt(document.getElementById('addReminder').value) || 0};
    if (end && !isAllDay) data.end_date = (endDate && endDate !== date ? endDate : date)+'T'+end;
    if (isAllDay) data.end_date = endDate ? endDate+'T23:59' : date+'T23:59';
    if (repeatInfinite) data.end_date = '';
    if (id) data.id = parseInt(id);
    var url = id ? '/api/bot/schedule/update' : '/api/bot/schedule';
    saving = true;
    var btn = document.getElementById('saveBtn');
    if (btn) { btn.disabled = true; btn.textContent = '저장 중...'; }
    fetch(url, {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify(data)})
    .then(function(r){return r.json()}).then(function(d){
        if (d.success) {
            document.getElementById('editId').value = '';
            ['addTitle','addLoc','memoEditor','addStart','addEnd','addEndDate','addAccommodation'].forEach(function(x){
                var el = document.getElementById(x);
                if (el) el.value = '';
            });
            document.getElementById('addAllDay').checked = false;
            repeatOn = false;
            document.getElementById('addRepeatInterval').value = 1;
            setRepeatOptionsVisible(false);
            document.getElementById('addStart').disabled = false;
            document.getElementById('addEnd').disabled = false;
            alert(id?'수정 완료':'등록 완료');
            loadEvents().then(() => switchTab('view'));
        } else {
            alert(d.error || '저장 실패');
        }
    })
    .catch(function(e){ alert('저장 중 오류: '+e); })
    .finally(function(){
        saving = false;
        var b = document.getElementById('saveBtn');
        if (b) { b.disabled = false; b.textContent = document.getElementById('editId').value ? '수정' : '저장'; }
    });
}

function deleteEvent(id, mode, date) {
    var body = { id: id };
    if (mode) body.mode = mode;
    if (date) body.date = date;
    fetch('/api/bot/schedule/delete', {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify(body)})
    .then(function(r){ return r.json(); }).then(function(d){
        if (d.success) loadEvents();
    });
}

var delPending = null;
function confirmDelete(id) {
    var ev = null;
    for (var i=0;i<schedules.length;i++){ if (String(schedules[i].id)===String(id)) { ev = schedules[i]; break; } }
    if (!ev) return;
    if (ev.is_recurring) {
        var baseId = id, date = (ev.event_date||'').slice(0,10);
        var sid = String(id);
        if (sid.indexOf('_') >= 0) {
            var parts = sid.split('_');
            baseId = parts[0];
            date = parts[1].replace(/(\d{4})(\d{2})(\d{2})/, '$1-$2-$3');
        }
        delPending = { baseId: baseId, date: date };
        document.getElementById('delModal').style.display = 'flex';
    } else {
        if (confirm('삭제할까요?')) deleteEvent(id, 'all', null);
    }
}
function closeDel() { document.getElementById('delModal').style.display = 'none'; delPending = null; }
function doDelete(mode) {
    if (!delPending) return;
    var p = delPending;
    closeDel();
    deleteEvent(p.baseId, mode, p.date);
}


</script>
<div id="delModal" style="display:none; position:fixed; inset:0; background:rgba(0,0,0,.4); z-index:50; align-items:center; justify-content:center;">
  <div style="background:#fff; border-radius:12px; padding:16px; width:280px; max-width:90%; box-shadow:0 8px 24px rgba(0,0,0,.2);">
    <div class="fw-bold mb-1">반복 일정 삭제</div>
    <div class="small text-muted mb-3">어떤 범위를 삭제할까요?</div>
    <button type="button" class="btn btn-sm btn-danger w-100 mb-2" onclick="doDelete('all')">전체 삭제</button>
    <button type="button" class="btn btn-sm btn-outline-danger w-100 mb-2" onclick="doDelete('this_after')">이 일정 포함 이후 삭제</button>
    <button type="button" class="btn btn-sm btn-outline-secondary w-100 mb-2" onclick="doDelete('this_only')">이 일정만 삭제</button>
    <button type="button" class="btn btn-sm btn-light w-100" onclick="closeDel()">취소</button>
  </div>
</div>

<style>#memoEditor:empty:before{content:attr(data-ph);color:#999;}</style>
<div id="drawModal" style="display:none; position:fixed; inset:0; background:rgba(0,0,0,.5); z-index:90; align-items:center; justify-content:center;">
  <div class="bg-white p-3 rounded" style="width:360px; max-width:94%;">
    <div class="d-flex gap-2 mb-2 align-items-center">
      <input type="color" id="drawColor" value="#222222" class="form-control form-control-sm" style="width:46px; height:34px; padding:0;">
      <input type="range" id="drawSize" min="1" max="24" value="3" class="form-control form-control-sm" style="width:110px;">
      <span class="small">굵기</span>
      <button class="btn btn-sm btn-outline-secondary" onclick="drawClear()">지우기</button>
      <button class="btn btn-sm btn-secondary" onclick="closeDraw()">닫기</button>
    </div>
    <canvas id="drawCanvas" width="320" height="220" style="border:1px solid #ced4da; background:#fff; width:100%; touch-action:none; border-radius:6px;"></canvas>
    <div class="mt-2 text-end">
      <button class="btn btn-sm btn-primary" onclick="drawSave()">메모에 삽입</button>
    </div>
  </div>
</div>
<div id="detailModal" style="display:none; position:fixed; inset:0; background:rgba(0,0,0,.5); z-index:90; align-items:center; justify-content:center;">
  <div class="bg-white p-3 rounded" style="width:440px; max-width:94%; max-height:84vh; overflow:auto;">
    <div class="d-flex justify-content-between align-items-center mb-2">
      <strong id="detailTitle"></strong>
      <button class="btn btn-sm btn-secondary" onclick="closeDetail()">닫기</button>
    </div>
    <div id="detailMeta" class="small text-muted mb-2"></div>
    <div id="detailMemo" style="white-space:normal; word-break:break-word;"></div>
    <div class="mt-3 text-end">
      <button class="btn btn-sm btn-primary" id="detailEditBtn">수정</button>
    </div>
  </div>
</div>
</body>
</html>
