{% extends 'layout.html' %}
{% block content %}
<div class="container-fluid px-3 py-3" style="max-width: 100%;">
    <a href="/intro" class="btn btn-sm btn-outline-secondary mb-3">← 인트로로</a>
    <h4 class="fw-bold mb-3 text-center">📍 마을 제보하기</h4>
    
    <div class="card border-0 shadow-sm" style="border-radius: 16px;">
        <div class="card-body p-3">
            <form id="reportForm" enctype="multipart/form-data">
                <div class="mb-3">
                    <label class="form-label fw-bold small">제목</label>
                    <input type="text" name="title" class="form-control" placeholder="예: 도로 파손, 가로등 고장, 쓰레기 무단투기" required>
                </div>
                
                <div class="mb-3">
                    <label class="form-label fw-bold small">설명 (선택)</label>
                    <textarea name="description" class="form-control" rows="3" placeholder="자세한 내용이 있으면 적어주세요."></textarea>
                </div>
                
                <div class="mb-3">
                    <label class="form-label fw-bold small">📸 사진 촬영</label>
                    <input type="file" name="image" class="form-control" accept="image/*" capture="environment" onchange="previewImage(this)">
                    <div id="imagePreview" class="mt-2" style="display:none;">
                        <img id="previewImg" src="#" alt="미리보기" style="width:100%; border-radius:12px; border:1px solid #eee;">
                    </div>
                </div>
                
                <div class="mb-3">
                    <label class="form-label fw-bold small">📍 현재 위치 (선택)</label>
                    <div class="d-flex gap-2">
                        <button type="button" class="btn btn-outline-success flex-grow-1" onclick="getLocation()" id="locationBtn">
                            <span id="locationBtnText">📍 현재 위치 가져오기</span>
                        </button>
                    </div>
                    <div id="locationStatus" class="mt-2 text-center text-muted small">위치 수집 안 함 (주소 기반 자동 추정)</div>
                    <input type="hidden" name="latitude" id="latitude">
                    <input type="hidden" name="longitude" id="longitude">
                </div>
                
                <div class="alert alert-info small py-2">
                    <strong>귀하의 주소지:</strong> {{ user.town }} {{ user.village }}<br>
                    GPS를 수집하면 더 정확한 위치 기반 분류가 가능합니다.<br>
                    수집하지 않아도 주소 기반으로 리단위가 자동 추정됩니다.
                </div>
                
                <button type="submit" class="btn btn-success w-100 py-3 fw-bold" style="border-radius:12px; font-size:1.1rem;" id="submitBtn">
                    제보 접수하기
                </button>
            </form>
        </div>
    </div>
</div>

<script>
function previewImage(input) {
    if (input.files && input.files[0]) {
        const reader = new FileReader();
        reader.onload = function(e) {
            document.getElementById('previewImg').src = e.target.result;
            document.getElementById('imagePreview').style.display = 'block';
        };
        reader.readAsDataURL(input.files[0]);
    }
}

function getLocation() {
    const status = document.getElementById('locationStatus');
    const btn = document.getElementById('locationBtn');
    const btnText = document.getElementById('locationBtnText');
    
    if (!navigator.geolocation) {
        status.textContent = '이 브라우저는 위치정보를 지원하지 않습니다.';
        status.className = 'mt-2 text-center text-danger small';
        return;
    }
    
    status.textContent = '위치 수집 중...';
    status.className = 'mt-2 text-center text-primary small';
    btn.disabled = true;
    btnText.textContent = '수집 중...';
    
    navigator.geolocation.getCurrentPosition(
        pos => {
            document.getElementById('latitude').value = pos.coords.latitude;
            document.getElementById('longitude').value = pos.coords.longitude;
            status.textContent = `✅ 수집 완료 (${pos.coords.latitude.toFixed(6)}, ${pos.coords.longitude.toFixed(6)})`;
            status.className = 'mt-2 text-center text-success small';
            btnText.textContent = '위치 재수집';
            btn.disabled = false;
        },
        err => {
            status.textContent = '❌ 위치 수집 실패: ' + err.message;
            status.className = 'mt-2 text-center text-danger small';
            btnText.textContent = '다시 시도';
            btn.disabled = false;
        },
        { enableHighAccuracy: true, timeout: 15000, maximumAge: 0 }
    );
}

document.getElementById('reportForm').addEventListener('submit', async function(e) {
    e.preventDefault();
    const btn = document.getElementById('submitBtn');
    
    btn.disabled = true;
    btn.textContent = '접수 중...';
    
    const formData = new FormData(this);
    
    try {
        const response = await fetch('/village-report', {
            method: 'POST',
            body: formData
        });
        const data = await response.json();
        
        if (data.status === 'success') {
            alert(data.msg);
            window.location.href = '/intro';
        } else {
            alert(data.msg || '오류 발생');
            btn.disabled = false;
            btn.textContent = '제보 접수하기';
        }
    } catch (err) {
        alert('오류: ' + err.message);
        btn.disabled = false;
        btn.textContent = '제보 접수하기';
    }
});
</script>
{% endblock %}
