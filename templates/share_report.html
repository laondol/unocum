{% extends 'layout.html' %}
{% block content %}
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<div class="container-fluid px-3 py-3" style="max-width: 100%;">
    <a href="/intro" class="btn btn-sm btn-outline-secondary mb-3">← 인트로로</a>
    <h4 class="fw-bold mb-3 text-center">📍 공유마당</h4>
    {% if not session.get('username') %}
    <div class="alert alert-warning small p-3 mb-3" style="border-radius: 12px;">
        ⚠️ <strong>비회원 제출 주의사항</strong><br>
        공유마당에 보내시는 모든 내용은 회원정보 없이 보내시는 것은 모든 소유권을 포기하신 것으로 생각하고 모든 권리는 함께사는양평이 소유합니다. 추후 어떤 이의도 제기할 수 없습니다.
    </div>
    {% endif %}
    
    <div class="card border-0 shadow-sm" style="border-radius: 16px;">
        <div class="card-body p-3">
            <form id="shareForm" enctype="multipart/form-data">
                <!-- 사진촬영 (모바일 카메라 / 데스크탑 파일선택) -->
                <div class="mb-3">
                    <input type="file" name="camera_image" id="cameraInput" accept="image/*" capture="environment" onchange="previewFile(this)" style="display:none;">
                    <button type="button" id="cameraBtn" class="btn btn-success w-100 py-3 fw-bold" style="border-radius:12px; font-size:1.1rem;" onclick="document.getElementById('cameraInput').click()">
                        📸 사진촬영
                    </button>
                </div>

                <!-- 파일 업로드 -->
                <div class="mb-3">
                    <span class="fw-bold small d-block mb-1">📁 파일 업로드</span>
                    <input type="file" name="image" class="form-control" accept="image/*" onchange="previewFile(this)">
                    <div id="fileUploadPreview" class="mt-2" style="display:none;"></div>
                </div>

                <!-- 직접 그리기 -->
                <div class="mb-3">
                    <label class="form-label fw-bold small">🎨 직접 그리기</label>
                    <button type="button" class="btn btn-sm btn-outline-secondary mb-2" onclick="toggleCanvas()">🎨 그리기 열기/닫기</button>
                    <div id="canvas-container" style="display:none;">
                        <canvas id="drawing-pad" width="100%" height="300" style="border:1px solid #ccc; background:white; cursor:crosshair; border-radius: 12px;"></canvas>
                        <div class="mt-1">
                            <button type="button" class="btn btn-sm btn-light" onclick="clearCanvas()">지우기</button>
                        </div>
                        <input type="hidden" name="drawing_data" id="drawing_data">
                    </div>
                </div>
                
                <!-- 제목 (선택) -->
                <div class="mb-3">
                    <label class="form-label fw-bold small">제목 (선택)</label>
                    <input type="text" name="title" class="form-control" placeholder="예: 양근리 벚꽃길, 용문산 등산로 풍경">
                </div>
                
                <!-- 설명 (선택) -->
                <div class="mb-3">
                    <label class="form-label fw-bold small">설명 (선택)</label>
                    <textarea name="description" class="form-control" rows="3" placeholder="자세한 내용이 있으면 적어주세요."></textarea>
                </div>
                
                <!-- 현재 위치 자동 수집 -->
                <div class="mb-3">
                    <label class="form-label fw-bold small">📍 현재 위치</label>
                    <div id="locationStatus" class="mb-2 text-center text-muted small">위치 수집 중... (브라우저 권한 허용 필요)</div>
                    <div id="mapPreview" style="height: 200px; border-radius: 12px; display:none;" class="mb-2"></div>
                    <input type="hidden" name="latitude" id="latitude">
                    <input type="hidden" name="longitude" id="longitude">
                </div>
                
                <button type="submit" class="btn btn-success w-100 py-3 fw-bold" style="border-radius:12px; font-size:1.1rem;" id="submitBtn" disabled>
                    공유 접수하기
                </button>
            </form>
        </div>
    </div>
</div>

<script>
const canvas = document.getElementById('drawing-pad');
const ctx = canvas.getContext('2d');
let drawing = false;

function resizeCanvas() {
    const container = canvas.parentElement;
    canvas.width = container.clientWidth;
    canvas.height = 300;
}
window.addEventListener('resize', resizeCanvas);

canvas.addEventListener('mousedown', (e) => { drawing = true; draw(e); });
canvas.addEventListener('mouseup', () => { drawing = false; ctx.beginPath(); });
canvas.addEventListener('mousemove', draw);
canvas.addEventListener('touchstart', (e) => { drawing = true; draw(e.touches[0]); }, {passive: false});
canvas.addEventListener('touchend', () => { drawing = false; ctx.beginPath(); });
canvas.addEventListener('touchmove', (e) => { draw(e.touches[0]); }, {passive: false});

function draw(e) {
    if (!drawing) return;
    const rect = canvas.getBoundingClientRect();
    const x = e.clientX - rect.left;
    const y = e.clientY - rect.top;
    ctx.lineWidth = 3; ctx.lineCap = 'round'; ctx.strokeStyle = '#333';
    ctx.lineTo(x, y); ctx.stroke(); ctx.beginPath(); ctx.moveTo(x, y);
}

function toggleCanvas() { 
    const container = document.getElementById('canvas-container');
    container.style.display = container.style.display === 'none' ? 'block' : 'none'; 
    if (container.style.display === 'block') resizeCanvas();
}

function clearCanvas() { 
    ctx.clearRect(0, 0, canvas.width, canvas.height); 
}

function previewImage(input, previewId) {
    const preview = document.getElementById(previewId);
    if (input.files && input.files[0]) {
        const reader = new FileReader();
        reader.onload = function(e) {
            preview.querySelector('img').src = e.target.result;
            preview.style.display = 'block';
        };
        reader.readAsDataURL(input.files[0]);
    }
}

function previewVideo(input) {
    const preview = document.getElementById('videoPreview');
    if (input.files && input.files[0]) {
        const reader = new FileReader();
        reader.onload = function(e) {
            preview.querySelector('video').src = e.target.result;
            preview.style.display = 'block';
        };
        reader.readAsDataURL(input.files[0]);
    }
}

function previewFile(input) {
    const preview = document.getElementById('fileUploadPreview');
    if (!input.files || !input.files[0]) return;
    const file = input.files[0];
    const reader = new FileReader();
    reader.onload = function(e) {
        if (file.type.startsWith('image/')) {
            preview.innerHTML = `<img src="${e.target.result}" style="width:100%; border-radius:12px; border:1px solid #eee;">`;
        } else if (file.type.startsWith('video/')) {
            preview.innerHTML = `<video src="${e.target.result}" controls style="width:100%; border-radius:12px; border:1px solid #eee;"></video>`;
        } else {
            preview.innerHTML = `<div class="alert alert-info py-2 small">✅ ${file.name} 선택됨</div>`;
        }
        preview.style.display = 'block';
    };
    reader.readAsDataURL(file);
}

function autoGetLocation() {
    const status = document.getElementById('locationStatus');
    const submitBtn = document.getElementById('submitBtn');
    
    if (!navigator.geolocation) {
        status.textContent = '❌ 이 브라우저는 위치정보를 지원하지 않습니다.';
        status.className = 'mb-2 text-center text-danger small';
        submitBtn.disabled = false;
        return;
    }
    
    status.textContent = '📍 현재 위치를 자동으로 수집 중입니다... (브라우저에서 "허용" 눌러주세요)';
    status.className = 'mb-2 text-center text-primary small';
    
    navigator.geolocation.getCurrentPosition(
        pos => {
            const lat = pos.coords.latitude;
            const lon = pos.coords.longitude;
            document.getElementById('latitude').value = lat;
            document.getElementById('longitude').value = lon;
            status.textContent = '✅ 위치 수집 완료';
            status.className = 'mb-2 text-center text-success small';
            submitBtn.disabled = false;
            const mapDiv = document.getElementById('mapPreview');
            mapDiv.style.display = 'block';
            if (window.shareMap) {
                window.shareMap.setView([lat, lon], 15);
                window.shareMarker.setLatLng([lat, lon]);
            } else {
                window.shareMap = L.map(mapDiv).setView([lat, lon], 15);
                L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {maxZoom: 19}).addTo(window.shareMap);
                window.shareMarker = L.marker([lat, lon]).addTo(window.shareMap);
            }
            setTimeout(() => window.shareMap.invalidateSize(), 300);
        },
        err => {
            status.textContent = '⚠️ 위치 수집 실패: ' + err.message + ' (수동 입력 가능)';
            status.className = 'mb-2 text-center text-warning small';
            submitBtn.disabled = false;
        },
        { enableHighAccuracy: true, timeout: 15000, maximumAge: 0 }
    );
}

// 카메라 지원 감지
function checkCamera() {
    const btn = document.getElementById('cameraBtn');
    const unsupported = document.getElementById('cameraUnsupported');
    const isMobile = /Mobi|Android|iPhone|iPad|iPod|webOS/i.test(navigator.userAgent);
    if (!isMobile && !navigator.mediaDevices?.enumerateDevices) {
        btn.disabled = true;
        btn.className = 'btn btn-secondary w-100 py-3 fw-bold';
        btn.style.cssText = 'border-radius:12px; font-size:1.1rem;';
        btn.textContent = '📸 사진촬영 (사용불가)';
        unsupported.style.display = 'block';
    }
}

document.addEventListener('DOMContentLoaded', () => { autoGetLocation(); checkCamera(); });

document.getElementById('shareForm').addEventListener('submit', async function(e) {
    e.preventDefault();
    const btn = document.getElementById('submitBtn');
    
    btn.disabled = true;
    btn.textContent = '접수 중...';
    
    const formData = new FormData(this);
    const camInput = document.getElementById('cameraInput');
    if (camInput.files && camInput.files[0] && !formData.has('image')) {
        formData.set('image', camInput.files[0]);
    }
    
    const drawingData = canvas.toDataURL('image/png');
    if(drawingData.length > 2000) {
        formData.set('drawing_data', drawingData);
    }


    
    try {
        const response = await fetch('/share-report', {
            method: 'POST',
            body: formData
        });
        const data = await response.json();
        
        if (data.status === 'success') {
            alert(data.msg);
            window.location.href = '/share';
        } else {
            alert(data.msg || '오류 발생');
            btn.disabled = false;
            btn.textContent = '공유 접수하기';
        }
    } catch (err) {
        alert('오류: ' + err.message);
        btn.disabled = false;
        btn.textContent = '공유 접수하기';
    }
});
</script>
{% endblock %}
