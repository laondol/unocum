{% extends 'layout.html' %}
{% block head %}
<script src="https://cdn.jsdelivr.net/npm/qrcodejs@1.0.0/qrcode.min.js"></script>
{% endblock %}
{% block content %}
<div class="container py-4" style="max-width: 500px;">
    <h4 class="fw-bold mb-3"><span class="badge bg-success me-2">마</span>주민 초대 QR</h4>
    <div class="card border-0 shadow-sm mb-3" style="border-radius:16px;">
        <div class="card-body text-center p-4">
            <div id="qrcode" class="d-inline-block"></div>
            <p class="text-muted small mt-3">회원님이 이 QR을 스캔하면 마을 등록 페이지로 이동합니다.</p>
            <p class="text-danger small">유효시간: 10분</p>
        </div>
    </div>
    <div class="card border-0 shadow-sm mb-3" style="border-radius:16px;background:#e8f5e9;">
        <div class="card-body p-3">
            <h6 class="fw-bold">📋 담당 마을</h6>
            <div class="d-flex flex-wrap gap-1">
                {% for r in ris %}<span class="badge bg-success">{{ r }}</span>{% endfor %}
            </div>
        </div>
    </div>
    <div class="text-center">
        <button class="btn btn-sm btn-outline-success" onclick="location.reload()">🔄 새 QR 생성</button>
        <a href="/village" class="btn btn-sm btn-outline-secondary">&larr; 마을지기</a>
    </div>
</div>
<script>
new QRCode(document.getElementById('qrcode'), {
    text: '{{ qr_url }}',
    width: 250,
    height: 250,
    colorDark: '#27ae60',
    colorLight: '#ffffff'
});
var expiry = {{ expiry }} * 1000;
setInterval(function() {
    var left = Math.max(0, Math.ceil((expiry - Date.now()) / 1000));
    var el = document.querySelector('.text-danger.small');
    if (el) el.textContent = '유효시간: ' + left + '초';
    if (left <= 0) { el.textContent = '만료됨 - 새로고침 필요'; el.style.color = '#dc3545'; }
}, 1000);
</script>
{% endblock %}
