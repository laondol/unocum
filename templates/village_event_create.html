{% extends 'layout.html' %}
{% block content %}
<div class="container py-4" style="max-width: 600px;">
    <h4 class="fw-bold mb-3"><span class="badge bg-success me-2">마</span>새 행사/회의 만들기</h4>
    <div class="card border-0 shadow-sm" style="border-radius:16px;">
        <div class="card-body p-4">
            <form method="post">
                <div class="mb-3">
                    <label class="form-label small fw-bold">유형</label>
                    <select name="event_type" class="form-select">
                        <option value="meeting">📋 회의</option>
                        <option value="activity">🎉 행사</option>
                    </select>
                </div>
                <div class="mb-3">
                    <label class="form-label small fw-bold">제목</label>
                    <input type="text" name="title" class="form-control" required>
                </div>
                <div class="mb-3">
                    <label class="form-label small fw-bold">일시</label>
                    <input type="datetime-local" name="event_date" class="form-control" required>
                </div>
                <div class="mb-3">
                    <label class="form-label small fw-bold">장소</label>
                    <input type="text" name="location" class="form-control" placeholder="마을회관, 카페 등">
                </div>
                <div class="mb-3">
                    <label class="form-label small fw-bold">영상 링크 (YouTube 등)</label>
                    <input type="url" name="video_url" class="form-control" placeholder="https://youtube.com/...">
                </div>
                <div class="mb-3">
                    <label class="form-label small fw-bold">설명</label>
                    <textarea name="description" class="form-control" rows="3"></textarea>
                </div>
                <button type="submit" class="btn btn-success w-100">만들기</button>
            </form>
        </div>
    </div>
</div>
{% endblock %}
