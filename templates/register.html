{% extends 'layout.html' %}
{% block content %}
<div class="row justify-content-center py-5">
    <div class="col-md-6 col-lg-5">
        <div class="card p-5 shadow-lg border-0" style="border-radius: 25px; background: white;">
            <h3 class="fw-bold mb-3 text-center text-success">🌳 이웃 가입 신청</h3>
            <p class="text-muted text-center small mb-4">함께사는양평의 소중한 이웃이 되어주세요.</p>
            
            <form action="/register" method="post">
                <div class="mb-3">
                    <label class="form-label small fw-bold">이메일 (로그인 ID)</label>
                    <input type="email" name="email" class="form-control" placeholder="yangpyeong@example.com" required>
                </div>
                <div class="mb-3">
                    <label class="form-label small fw-bold">비밀번호</label>
                    <div class="input-group">
                        <input type="password" name="password" id="regPw" class="form-control" placeholder="비밀번호 입력" required>
                        <button type="button" class="btn btn-outline-secondary" onclick="toggleRegPw()">👁</button>
                    </div>
                </div>
                <div class="mb-3">
                    <label class="form-label small fw-bold">이름 (실명)</label>
                    <input type="text" name="real_name" class="form-control" placeholder="홍길동" required>
                </div>
                <div class="mb-3">
                    <label class="form-label small fw-bold">닉네임</label>
                    <input type="text" name="username" class="form-control" placeholder="활동명" required>
                </div>
                
                <div class="mb-4">
                    <label class="form-label small fw-bold">주민등록상 주소 (읍/면/리)</label>
                    <div class="row g-2">
                        <div class="col-6">
                            <select name="town" id="town-select" class="form-select" onchange="updateVillages()" required>
                                <option value="">읍/면 선택</option>
                                <option value="관외">관외 (양평 외 지역)</option>
                                <option value="양평읍">양평읍</option>
                                <option value="강상면">강상면</option>
                                <option value="강하면">강하면</option>
                                <option value="양서면">양서면</option>
                                <option value="옥천면">옥천면</option>
                                <option value="서종면">서종면</option>
                                <option value="단월면">단월면</option>
                                <option value="청운면">청운면</option>
                                <option value="양동면">양동면</option>
                                <option value="지평면">지평면</option>
                                <option value="용문면">용문면</option>
                                <option value="개군면">개군면</option>
                            </select>
                        </div>
                        <div class="col-6">
                            <select name="village" id="village-select" class="form-select" required disabled>
                                <option value="">리 선택</option>
                            </select>
                        </div>
                    </div>
                </div>

                <div class="mb-3 form-check">
                    <input type="checkbox" class="form-check-input" id="agreeTerms" required>
                    <label class="form-check-label small" for="agreeTerms">
                        <a href="/terms" target="_blank" class="text-decoration-none">회원약관 및 닢 운영 규칙</a>에 동의합니다 (필수)
                    </label>
                </div>

                <div class="card p-3 mb-3 border-0" style="background-color: #fff8e1; border-radius: 15px;">
                    <h6 class="fw-bold mb-2" style="color: #8d6e00;">📌 중요! 다음 사항을 확인하고 동의해 주세요</h6>
                    <div style="font-size: 0.82rem; line-height: 1.6; color: #5d4e37;">
                        <p class="mb-1">✓ <strong>AI 콘텐츠 심사</strong> — 모든 게시글·댓글·공유는 AI 지킴이가 분석합니다.</p>
                        <p class="mb-1">✓ <strong>이메일 인증</strong> — 투표(좋아요/나빠요)는 이메일 인증 후 가능합니다.</p>
                        <p class="mb-1">✓ <strong>닢 선지급</strong> — 가입 시 1,000닢이 지급됩니다.</p>
                    </div>
                    <div class="form-check mt-2">
                        <input type="checkbox" class="form-check-input" id="agreeImportant" name="agree_important" required>
                        <label class="form-check-label small fw-bold" for="agreeImportant" style="color: #8d6e00;">
                            위 중요 사항을 모두 확인하였으며 동의합니다 (필수)
                        </label>
                    </div>
                </div>

                <button class="btn btn-success w-100 p-3 fw-bold" style="font-size: 1.1rem; border-radius: 12px;">이웃 가입 신청하기</button>
            </form>
            <div class="text-center mt-3">
                <span class="text-muted small">이미 회원이신가요? </span>
                <a href="/login" class="text-success fw-bold small text-decoration-none">로그인</a>
            </div>
        </div>
    </div>
</div>
<script>
const yangpyeongData = {
    "양평읍": ["양근리", "오빈리", "신애리", "덕평리", "공흥리", "백안리", "도곡리", "창대리", "회현리"],
    "강상면": ["병산리", "송학리", "세월리", "신화리", "화양리", "대석리", "교평리", "신대리"],
    "강하면": ["운심리", "왕창리", "동오리", "항금리", "전수리", "성덕리"],
    "양서면": ["용담리", "양수리", "부용리", "신원리", "국수리", "복포리", "대심리", "청계리", "목왕리"],
    "옥천면": ["옥천리", "아신리", "신복리", "용천리"],
    "서종면": ["문호리", "도장리", "수입리", "수능리", "명달리", "화서리", "서후리"],
    "단월면": ["보룡리", "삼가리", "봉상리", "향소리", "덕수리", "산음리", "석산리", "명성리"],
    "청운면": ["용두리", "여물리", "비룡리", "다대리", "신론리", "삼성리", "갈운리", "도원리"],
    "양동면": ["쌍학리", "석곡리", "매월리", "고송리", "삼산리", "단석리", "계정리"],
    "지평면": ["지평리", "송현리", "월산리", "망미리", "무왕리", "일신리", "대평리", "곡수리", "수곡리", "옥현리"],
    "용문면": ["다문리", "마룡리", "화전리", "삼성리", "조현리", "신점리", "덕촌리", "오촌리", "광탄리", "금곡리", "연수리", "중원리", "망능리"],
    "개군면": ["하자포리", "공세리", "레전리", "부리", "석장리", "자연리", "내리", "향리", "주읍리", "계전리", "구미리"]
};
function updateVillages() {
    const townSelect = document.getElementById('town-select');
    const villageSelect = document.getElementById('village-select');
    const selectedTown = townSelect.value;
    villageSelect.innerHTML = '<option value="">리 선택</option>';
    if (selectedTown === "" || selectedTown === "관외") { villageSelect.disabled = true; return; }
    const villages = yangpyeongData[selectedTown];
    villages.forEach(function(v) {
        const option = document.createElement('option');
        option.value = v; option.text = v;
        villageSelect.appendChild(option);
    });
    villageSelect.disabled = false;
}
function toggleRegPw() {
    var i = document.getElementById('regPw');
    i.type = i.type === 'password' ? 'text' : 'password';
}
</script>
{% endblock %}
