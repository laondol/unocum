{% extends 'layout.html' %}
{% block content %}
<div class="row justify-content-center py-4">
<div class="col-md-7 col-lg-6">
<div class="card p-4 shadow-lg border-0" style="border-radius: 20px;">
<h3 class="fw-bold mb-3 text-center text-success">🌳 회원가입</h3>
<p class="text-muted text-center small mb-4">함께사는양평의 소중한 이웃이 되어주세요.</p>

<!-- 닢 규칙 + 약관 -->
<div class="alert alert-light border small mb-3" style="font-size:0.8rem;max-height:150px;overflow-y:auto;">
<strong>💎 닢(물맑은머니) 규칙</strong><br>
• 가입 시 1,000닢 지급<br>
• 매월 이웃인증 완료 시 1,000닢 지급<br>
• 이웃인증은 월 1회 필수, 미인증 시 닢 지급 유보<br>
• 인증 완료 후 지급, 다음 지급은 30일 후<br>
• 양평군 내에서만 이웃인증 가능
<hr class="my-1">
{% include 'terms_snippet.html' %}
</div>
<div class="form-check mb-3">
    <input class="form-check-input" type="checkbox" id="agreeTerms" onchange="toggleVerifyBtn()">
    <label class="form-check-label small" for="agreeTerms">약관 및 닢 규칙에 동의합니다</label>
</div>

<!-- Step 1: 이메일 인증 -->
<div class="mb-3">
    <label class="small fw-bold">📧 이메일</label>
    <div class="input-group">
        <input type="email" id="emailInput" class="form-control form-control-sm" placeholder="이메일 주소">
        <button class="btn btn-sm btn-success" id="verifyBtn" onclick="sendCode()" disabled>인증하기</button>
    </div>
    <div id="verifyStatus" class="small mt-1"></div>
</div>

<!-- 인증코드 입력 -->
<div id="codeSection" style="display:none;" class="mb-3">
    <div class="input-group input-group-sm">
        <input type="text" id="codeInput" class="form-control" placeholder="인증코드 6자리" maxlength="6">
        <button class="btn btn-sm btn-outline-success" onclick="verifyCode()">확인</button>
    </div>
</div>

<!-- Step 2: 위치 (이메일 인증 후 표시) -->
<div id="locationSection" style="display:none;">
    <hr>
    <h6 class="small fw-bold mb-2">📍 현재위치 & 이웃인증</h6>
    <div id="gpsStatus" class="small text-muted mb-1">GPS 확인 중...</div>
    <div id="locDetail" class="small mb-1" style="display:none;"></div>
    <div class="d-flex gap-1 mb-2">
        <button class="btn btn-sm btn-outline-success" onclick="doNeighborVerify()" id="neighborBtn">🏠 이웃인증</button>
        <button class="btn btn-sm btn-outline-secondary" onclick="showCorrect()">📍 보정</button>
    </div>
    <div id="neighborStatus" class="small mb-2"></div>

    <!-- 보정 폼 -->
    <div id="correctForm" style="display:none;" class="mb-2 p-2 bg-light rounded small">
        <input type="text" id="manualAddr" class="form-control form-control-sm mb-1" placeholder="상세주소 (예: 양수로 123)">
        <button class="btn btn-sm btn-success" onclick="doCorrect()">보정하기</button>
    </div>

    <!-- Step 3: 기본정보 -->
    <hr>
    <h6 class="small fw-bold mb-2">👤 기본정보</h6>
    <div class="row g-2 mb-2">
        <div class="col-6">
            <label class="small">이름</label>
            <input type="text" id="realName" class="form-control form-control-sm" required>
        </div>
        <div class="col-6">
            <label class="small">별명</label>
            <input type="text" id="nickname" class="form-control form-control-sm" required>
        </div>
    </div>
    <div class="row g-2 mb-2">
        <div class="col-6">
            <label class="small">비밀번호</label>
            <input type="password" id="password" class="form-control form-control-sm" required>
        </div>
        <div class="col-6">
            <label class="small">비밀번호 확인</label>
            <input type="password" id="password2" class="form-control form-control-sm" required>
        </div>
    </div>
    <div class="mb-2">
        <label class="small">프로필 사진</label>
        <input type="file" id="profileImg" class="form-control form-control-sm" accept="image/*">
        <div id="imgPreview" class="mt-1"></div>
    </div>
    <button class="btn btn-success w-100" onclick="submitRegister()">🌳 회원가입 완료</button>
</div>
</div>
</div>
</div>

<script>
let gpsLat=0, gpsLng=0, verifiedEmail='', isNeighbor=false, correctedAddr='';

function toggleVerifyBtn() {
    document.getElementById('verifyBtn').disabled = !document.getElementById('agreeTerms').checked;
}

function sendCode() {
    if (!document.getElementById('agreeTerms').checked) return alert('약관에 동의해 주세요.');
    var email = document.getElementById('emailInput').value.trim();
    if (!email) return alert('이메일을 입력하세요.');
    var fd = new FormData(); fd.append('email', email);
    fetch('/register/send-code', {method:'POST', body:fd})
    .then(r=>r.json()).then(d=>{
        document.getElementById('verifyStatus').innerHTML = '<span class="text-success">'+d.msg+'</span>';
        if (d.status==='success') document.getElementById('codeSection').style.display='';
    });
}

function verifyCode() {
    var code = document.getElementById('codeInput').value.trim();
    var fd = new FormData(); fd.append('code', code);
    fetch('/register/verify-code', {method:'POST', body:fd})
    .then(r=>r.json()).then(d=>{
        if (d.status==='success') {
            verifiedEmail = document.getElementById('emailInput').value;
            document.getElementById('locationSection').style.display='';
            document.getElementById('verifyStatus').innerHTML = '<span class="text-success">✅ 인증완료</span>';
            getGPS();
        } else {
            alert(d.msg);
        }
    });
}

function getGPS() {
    if (!navigator.geolocation) { document.getElementById('gpsStatus').innerHTML='GPS 미지원'; return; }
    navigator.geolocation.getCurrentPosition(function(pos){
        gpsLat=pos.coords.latitude; gpsLng=pos.coords.longitude;
        document.getElementById('gpsStatus').innerHTML = '📍 현재위치: '+gpsLat.toFixed(5)+', '+gpsLng.toFixed(5);
        // 역지오코딩으로 주소 표시
        fetch('/api/reverse-geocode?lat='+gpsLat+'&lon='+gpsLng)
        .then(r=>r.json()).then(d=>{
            if (d.status==='success') {
                document.getElementById('locDetail').innerHTML = '🏠 '+d.town+' '+d.village;
                document.getElementById('locDetail').style.display='';
            }
        });
    }, function(){ document.getElementById('gpsStatus').innerHTML='GPS 실패'; });
}

function doNeighborVerify() {
    if (!gpsLat) return alert('GPS를 먼저 확인하세요.');
    var fd = new FormData(); fd.append('lat', gpsLat); fd.append('lon', gpsLng);
    fetch('/neighbor/verify', {method:'POST', body:fd})
    .then(r=>r.json()).then(d=>{
        document.getElementById('neighborStatus').innerHTML = d.status==='success' ? '<span class="text-success">✅ '+d.msg+'</span>' : '<span class="text-danger">'+d.msg+'</span>';
        if (d.status==='success') isNeighbor = true;
    });
}

function showCorrect() { document.getElementById('correctForm').style.display=''; }

function doCorrect() {
    var addr = document.getElementById('manualAddr').value.trim();
    if (!addr) return alert('주소를 입력하세요.');
    fetch('/user/location/correct', {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({manual_loc:addr, gps_lat:gpsLat, gps_lng:gpsLng})})
    .then(r=>r.json()).then(d=>{
        alert(d.msg);
        if (d.status==='success') correctedAddr = addr;
    });
}

function submitRegister() {
    if (!isNeighbor) return alert('이웃인증을 완료해 주세요.');
    var name = document.getElementById('realName').value.trim();
    var nick = document.getElementById('nickname').value.trim();
    var pw = document.getElementById('password').value;
    var pw2 = document.getElementById('password2').value;
    if (!name || !nick) return alert('이름과 별명을 입력하세요.');
    if (pw !== pw2 || pw.length < 4) return alert('비밀번호를 확인하세요.');

    var fd = new FormData();
    fd.append('real_name', name); fd.append('username', nick);
    fd.append('password', pw); fd.append('lat', gpsLat); fd.append('lon', gpsLng);

    var img = document.getElementById('profileImg').files[0];
    if (img) fd.append('profile_img', img);

    fetch('/register', {method:'POST', body:fd})
    .then(r=>r.text()).then(html=>{
        if (html.includes('가입 신청 완료')) {
            alert('가입 완료! 로그인해 주세요.');
            location.href='/login';
        } else {
            document.write(html);
        }
    });
}
</script>
{% endblock %}
